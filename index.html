<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mosaico 10k Numerado</title>
    <style>
        body {
            margin: 0;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            font-family: sans-serif;
        }

        #contenedor-mosaico {
            display: grid;
            /* 100 columnas de 10px */
            grid-template-columns: repeat(100, 10px);
            grid-auto-rows: 10px;
            width: 1000px; 
            background-color: #fff;
            border: 1px solid #ccc;
        }

        .espacio-vacio {
            width: 10px;
            height: 10px;
            border: 0.1px solid #eee;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Texto del número muy pequeño */
            font-size: 3px; 
            color: #ccc;
            user-select: none; /* Para que no se resalte el texto al clicar */
        }

        /* Resaltar el número al pasar el ratón */
        .espacio-vacio:hover {
            background-color: #f0f0f0;
            color: #000;
            font-size: 7px; /* Se agranda un poco al pasar el ratón */
            z-index: 1;
        }

        .anuncio {
            background-size: cover;
            background-position: center;
            outline: 1px solid #333;
            z-index: 2;
        }
    </style>
</head>
<body>

    <div id="contenedor-mosaico"></div>

    <script>
        const contenedor = document.getElementById('contenedor-mosaico');

        // 1. Llenamos y numeramos los 10.000 cuadros
        function crearFondoNumerado() {
            const frag = document.createDocumentFragment();
            for (let i = 1; i <= 10000; i++) {
                const div = document.createElement('div');
                div.className = 'espacio-vacio';
                div.innerText = i; // Ponemos el número
                frag.appendChild(div);
            }
            contenedor.appendChild(frag);
        }

        /**
         * FUNCIÓN PARA COLOCAR IMÁGENES
         * x: columna (1-100) | y: fila (1-100)
         */
        function colocarImagen(x, y, w, h, url) {
            const img = document.createElement('div');
            img.className = 'anuncio';
            img.style.backgroundImage = `url('${url}')`;
            img.style.gridColumn = `${x} / span ${w}`;
            img.style.gridRow = `${y} / span ${h}`;
            contenedor.appendChild(img);
        }

        // Ejecutar
        crearFondoNumerado();

        // Ejemplo: Colocar una imagen en la zona del cuadro número 1
        colocarImagen(1, 1, 10, 5, 'https://picsum.photos/100/50?1');
    </script>
</body>
</html>
