<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosaico 500k - 4x4 Vertical</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow-x: hidden; /* Solo scroll vertical */
            display: flex;
            justify-content: center;
        }

        #contenedor-mosaico {
            display: flex;
            flex-wrap: wrap; 
            width: 100vw;    
            background-color: #000;
        }

        .espacio {
            width: 4px;      /* Tamaño ajustado a 4x4 */
            height: 4px;     /* Tamaño ajustado a 4x4 */
            box-sizing: border-box;
            background-color: #1a1a1a; 
            /* Mantenemos el borde ultra fino para distinguir los huecos */
            border: 0.1px solid #111;
            flex-shrink: 0;
        }

        /* Efecto visual al pasar el ratón */
        .espacio:hover {
            background-color: #ff00ff;
            border: none;
        }
    </style>
</head>
<body>

    <div id="contenedor-mosaico"></div>

    <script>
        const totalEspacios = 500000;
        const contenedor = document.getElementById('contenedor-mosaico');

        function generarMosaico() {
            let generados = 0;
            const lote = 15000; // Mantenemos la carga por lotes para fluidez

            function dibujar() {
                const fragmento = document.createDocumentFragment();
                
                for (let i = 0; i < lote && generados < totalEspacios; i++) {
                    const div = document.createElement('div');
                    div.className = 'espacio';
                    fragmento.appendChild(div);
                    generados++;
                }
                
                contenedor.appendChild(fragmento);

                if (generados < totalEspacios) {
                    // Sincroniza con el refresco del monitor para no laggear
                    requestAnimationFrame(dibujar);
                }
            }
            
            dibujar();
        }

        // Retraso de seguridad para carga de DOM
        setTimeout(generarMosaico, 300);
    </script>
</body>
</html>
