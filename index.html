<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>500k Blocks - Doble Tamaño</title>
    <style>
        * { box-sizing: border-box; touch-action: none; }
        body { 
            margin: 0; background: #000; color: #0f0; 
            font-family: 'Courier New', monospace; overflow: hidden; height: 100vh;
            display: flex; flex-direction: column;
        }
        header { 
            background: #1a1a1a; text-align: center; padding: 10px;
            border-bottom: 2px solid #333; font-size: 14px; z-index: 10;
        }
        #viewport {
            flex: 1; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        #canvas-wrapper { transform-origin: center; will-change: transform; }
        canvas { 
            background: #fff; image-rendering: pixelated; 
            border: 2px solid #555;
        }
        #info {
            position: fixed; bottom: 10px; left: 10px;
            background: rgba(0,0,0,0.8); padding: 10px;
            font-size: 12px; border-radius: 5px; pointer-events: none;
            border: 1px solid #0f0;
        }
        .bold { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <strong>MEGA PIXEL BOARD</strong><br>
    500,000 bloques de 4x4px | Lienzo: 2000x4000
</header>

<div id="viewport">
    <div id="canvas-wrapper">
        <canvas id="mainCanvas"></canvas>
    </div>
</div>

<div id="info">
    ID BLOQUE: <span id="bid" class="bold">-</span><br>
    COORD: <span id="coords" class="bold">0, 0</span><br>
    ZOOM: <span id="zval" class="bold">100</span>%
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const wrapper = document.getElementById('canvas-wrapper');
    const bidDisp = document.getElementById('bid');
    const coordDisp = document.getElementById('coords');
    const zDisp = document.getElementById('zval');

    // CONFIGURACIÓN DUPLICADA
    const COLS = 500;
    const ROWS = 1000;
    const BSIZE = 4; // Duplicado de 2 a 4
    canvas.width = COLS * BSIZE;  // 2000px
    canvas.height = ROWS * BSIZE; // 4000px

    let scale = 0.3, posX = 0, posY = 0;
    let isDragging = false, lastX = 0, lastY = 0, lastDist = 0;

    // Dibujar rejilla y ejemplo
    function initBoard() {
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Rejilla Negra más visible
        ctx.strokeStyle = "#cccccc"; 
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        for(let x=0; x<=canvas.width; x+=BSIZE) { ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); }
        for(let y=0; y<=canvas.height; y+=BSIZE) { ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); }
        ctx.stroke();
        
        // Ejemplo: Bloque 1 en Rojo (Ahora es de 4x4)
        ctx.fillStyle = "red";
        ctx.fillRect(0, 0, BSIZE, BSIZE);
    }

    function update() {
        wrapper.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
        zDisp.innerText = Math.round(scale * 100);
    }

    // --- CONTROLES ---
    const start = (x, y) => { isDragging = true; lastX = x; lastY = y; };
    const move = (x, y) => {
        if(!isDragging) return;
        posX += x - lastX; posY += y - lastY;
        lastX = x; lastY = y;
        update();
    };

    window.onmousedown = e => start(e.clientX, e.clientY);
    window.onmousemove = e => move(e.clientX, e.clientY);
    window.onmouseup = () => isDragging = false;
    window.onwheel = e => {
        const delta = e.deltaY > 0 ? 0.85 : 1.15;
        scale = Math.max(0.05, Math.min(scale * delta, 25));
        update();
    };

    // Táctil Móvil
    window.ontouchstart = e => {
        if(e.touches.length === 1) start(e.touches[0].clientX, e.touches[0].clientY);
        if(e.touches.length === 2) lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    };
    window.ontouchmove = e => {
        if(e.touches.length === 1) move(e.touches[0].clientX, e.touches[0].clientY);
        if(e.touches.length === 2) {
            let dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            scale *= (dist / lastDist);
            lastDist = dist;
            update();
        }
    };
    window.ontouchend = () => isDragging = false;

    // Pintar al hacer click/tap
    canvas.onpointerdown = e => {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) / scale;
        const y = (e.clientY - rect.top) / scale;
        const bx = Math.floor(x / BSIZE), by = Math.floor(y / BSIZE);
        
        if(bx >= 0 && bx < COLS && by >= 0 && by < ROWS) {
            const id = (by * COLS) + bx + 1;
            bidDisp.innerText = id.toLocaleString();
            coordDisp.innerText = `${bx}, ${by}`;
            
            ctx.fillStyle = `hsl(${Math.random()*360}, 80%, 50%)`;
            ctx.fillRect(bx*BSIZE, by*BSIZE, BSIZE, BSIZE);
            // Borde del bloque pintado
            ctx.strokeStyle = "rgba(0,0,0,0.2)";
            ctx.strokeRect(bx*BSIZE, by*BSIZE, BSIZE, BSIZE);
        }
    };

    initBoard();
    update();
</script>
</body>
</html>
