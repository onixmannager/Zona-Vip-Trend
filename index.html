<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosaico 500k - 5x5 Numerado</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            overflow-x: hidden; 
            display: flex;
            justify-content: center;
            font-family: sans-serif;
        }

        #contenedor-mosaico {
            display: flex;
            flex-wrap: wrap; 
            width: 100vw;    
            background-color: #fff;
            align-content: flex-start;
            /* Zoom manual permitido, evita auto-zoom molesto */
            touch-action: manipulation;
        }

        .espacio {
            width: 5px;       /* Tamaño solicitado 5x5 */
            height: 5px;      
            box-sizing: border-box;
            background-color: #fff; 
            border: 0.1px solid #f0f0f0;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Texto extremadamente pequeño */
            font-size: 1.5px; 
            color: rgba(0,0,0,0.1);
            user-select: none;
            overflow: hidden;
        }

        .espacio:hover {
            background-color: #000;
            color: #fff;
            font-size: 4px; /* Se agranda un poco al pasar el ratón para verlo */
            z-index: 5;
        }

        .espacio:active {
            background-color: #ff00ff;
        }
    </style>
</head>
<body>

    <div id="contenedor-mosaico"></div>

    <script>
        const totalEspacios = 500000;
        const contenedor = document.getElementById('contenedor-mosaico');
        // Reducimos el lote a 5000 para que el renderizado de 5x5 no sature el proceso visual
        const tamañoLote = 5000; 
        let generados = 0;

        function generarMosaico() {
            function renderBatch() {
                const fragmento = document.createDocumentFragment();
                const limite = Math.min(generados + tamañoLote, totalEspacios);

                for (let i = generados + 1; i <= limite; i++) {
                    const div = document.createElement('div');
                    div.className = 'espacio';
                    div.innerText = i;
                    fragmento.appendChild(div);
                }

                contenedor.appendChild(fragmento);
                generados = limite;

                if (generados < totalEspacios) {
                    // Mantiene la web fluida mientras se crean los 500k divs
                    requestAnimationFrame(renderBatch);
                }
            }

            renderBatch();
        }

        window.onload = generarMosaico;
    </script>
</body>
</html>
