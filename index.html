<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Pixel Page</title>

<style>
  body {
    margin: 0;
    text-align: center;
    background: #111;
    color: white;
    font-family: Arial;
  }

  img {
    max-width: 100%;
    image-rendering: pixelated;
  }
</style>
</head>
<body>

<h1>Mi Pixel Page</h1>
<p>Compra tu espacio</p>

<!-- Imagen base -->
<img src="https://via.placeholder.com/1000x500" usemap="#mapa">

<!-- Mapa clicable -->
<map name="mapa">

  <!-- Zona 1 -->
  <area shape="rect" coords="0,0,100,100" href="https://google.com" target="_blank">

  <!-- Zona 2 -->
  <area shape="rect" coords="100,0,200,100" href="https://youtube.com" target="_blank">

</map>

</body>
</html>
