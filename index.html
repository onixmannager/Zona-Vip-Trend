<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosaico 10k Numerado Adaptable</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            overflow-x: hidden; 
            display: flex;
            justify-content: center;
            font-family: sans-serif;
        }

        #contenedor-mosaico {
            display: flex;
            flex-wrap: wrap; 
            width: 100vw;    
            background-color: #fff;
            align-content: flex-start;
        }

        .espacio {
            width: 10px;      
            height: 10px;     
            box-sizing: border-box;
            background-color: #fff; 
            border: 0.1px solid #eee;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Tamaño de fuente minúsculo para el número */
            font-size: 3px;
            color: #ccc;
            user-select: none;
            transition: all 0.2s;
        }

        /* Resaltado al pasar el ratón para leer el número */
        .espacio:hover {
            background-color: #000;
            color: #fff;
            font-size: 8px;
            z-index: 10;
            cursor: crosshair;
        }
    </style>
</head>
<body>

    <div id="contenedor-mosaico"></div>

    <script>
        const totalEspacios = 10000;
        const contenedor = document.getElementById('contenedor-mosaico');

        function generarMosaico() {
            const fragmento = document.createDocumentFragment();
            
            for (let i = 1; i <= totalEspacios; i++) {
                const div = document.createElement('div');
                div.className = 'espacio';
                div.innerText = i; // Numeración del 1 al 10.000
                fragmento.appendChild(div);
            }
            
            contenedor.appendChild(fragmento);
        }

        // Carga el mosaico al abrir la página
        window.onload = generarMosaico;
    </script>
</body>
</html>
