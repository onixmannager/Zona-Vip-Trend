<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosaico 10k - Estilo Million Dollar</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0; /* Fondo gris claro tipo web antigua */
            overflow-x: hidden; 
            display: flex;
            justify-content: center;
        }

        #contenedor-mosaico {
            display: flex;
            flex-wrap: wrap; 
            width: 100vw;    
            background-color: #fff; /* Fondo blanco para los espacios */
            align-content: flex-start;
        }

        .espacio {
            width: 10px;      
            height: 10px;     
            box-sizing: border-box;
            background-color: #fff; 
            /* Borde sutil para ver la rejilla */
            border: 0.5px solid #ddd;
            flex-shrink: 0;
            transition: background-color 0.2s;
        }

        /* Efecto al pasar el ratón */
        .espacio:hover {
            background-color: #000; /* Se pinta de negro al pasar */
            border-color: #000;
        }
    </style>
</head>
<body>

    <div id="contenedor-mosaico"></div>

    <script>
        const totalEspacios = 10000; // 10.000 bloques de 10x10 = 1.000.000 px
        const contenedor = document.getElementById('contenedor-mosaico');

        function generarMosaico() {
            const fragmento = document.createDocumentFragment();
            
            for (let i = 0; i < totalEspacios; i++) {
                const div = document.createElement('div');
                div.className = 'espacio';
                fragmento.appendChild(div);
            }
            
            contenedor.appendChild(fragmento);
        }

        // Carga inmediata
        window.onload = generarMosaico;
    </script>
</body>
</html>
