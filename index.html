<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mosaico 10k Numerado - Sin Zoom</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            overflow-x: hidden; 
            display: flex;
            justify-content: center;
            font-family: sans-serif;
            /* Evita gestos de zoom del sistema en algunos navegadores */
            touch-action: manipulation; 
        }

        #contenedor-mosaico {
            display: flex;
            flex-wrap: wrap; 
            width: 100vw;    
            background-color: #fff;
            align-content: flex-start;
        }

        .espacio {
            width: 10px;      
            height: 10px;     
            box-sizing: border-box;
            background-color: #fff; 
            border: 0.1px solid #eee;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3px;
            color: #ccc;
            user-select: none;
            /* touch-action: none aquí asegura que el toque no dispare zoom */
            touch-action: none; 
            transition: background-color 0.2s, color 0.2s;
        }

        /* El hover solo cambia colores, no el tamaño de fuente para evitar saltos visuales */
        .espacio:hover {
            background-color: #000;
            color: #fff;
            z-index: 10;
            cursor: crosshair;
        }
    </style>
</head>
<body>

    <div id="contenedor-mosaico"></div>

    <script>
        const totalEspacios = 10000;
        const contenedor = document.getElementById('contenedor-mosaico');

        function generarMosaico() {
            const fragmento = document.createDocumentFragment();
            
            for (let i = 1; i <= totalEspacios; i++) {
                const div = document.createElement('div');
                div.className = 'espacio';
                div.innerText = i;
                fragmento.appendChild(div);
            }
            
            contenedor.appendChild(fragmento);
        }

        window.onload = generarMosaico;
    </script>
</body>
</html>
