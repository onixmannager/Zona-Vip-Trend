<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosaico 20k - 10x10 Vertical</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow-x: hidden; /* Solo scroll vertical */
            display: flex;
            justify-content: center;
        }

        #contenedor-mosaico {
            display: flex;
            flex-wrap: wrap; 
            width: 100vw;    
            background-color: #000;
        }

        .espacio {
            width: 100px;      /* Tamaño ajustado a 10x10 */
            height: 100px;     /* Tamaño ajustado a 10x10 */
            box-sizing: border-box;
            background-color: #1a1a1a; 
            /* Borde fino para distinguir los huecos */
            border: 0.5px solid #111;
            flex-shrink: 0;
        }

        /* Efecto visual al pasar el ratón */
        .espacio:hover {
            background-color: #ff00ff;
            border: none;
        }
    </style>
</head>
<body>

    <div id="contenedor-mosaico"></div>

    <script>
        const totalEspacios = 20000; // Total ajustado a 20.000
        const contenedor = document.getElementById('contenedor-mosaico');

        function generarMosaico() {
            let generados = 0;
            const lote = 5000; // Lote de carga

            function dibujar() {
                const fragmento = document.createDocumentFragment();
                
                for (let i = 0; i < lote && generados < totalEspacios; i++) {
                    const div = document.createElement('div');
                    div.className = 'espacio';
                    fragmento.appendChild(div);
                    generados++;
                }
                
                contenedor.appendChild(fragmento);

                if (generados < totalEspacios) {
                    requestAnimationFrame(dibujar);
                }
            }
            
            dibujar();
        }

        setTimeout(generarMosaico, 100);
    </script>
</body>
</html>
