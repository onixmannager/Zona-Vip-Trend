<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>500.000 zonas clicables</title>
  <style>
    html, body { height: 100%; margin: 0; background: #fff; }
    canvas { display: block; width: 100vw; height: 100vh; }
    .hud {
      position: fixed; left: 12px; top: 12px;
      font: 13px/1.35 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: #111;
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 10px;
      padding: 10px 12px;
      backdrop-filter: blur(6px);
      user-select: none;
    }
    .hud b { font-weight: 650; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="hud" id="hud">
    <div><b>Zonas:</b> <span id="zones">500000</span></div>
    <div><b>Hover:</b> <span id="hover">—</span></div>
    <div><b>Click:</b> <span id="click">—</span></div>
  </div>

  <script>
    // 500.000 zonas = 1000 * 500 (ajústalo si quieres otra geometría)
    const COLS = 1000;
    const ROWS = 500;
    const TOTAL = COLS * ROWS;

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d', { alpha: false });
    const elZones = document.getElementById('zones');
    const elHover = document.getElementById('hover');
    const elClick = document.getElementById('click');

    elZones.textContent = String(TOTAL);

    // Estado de interacción
    let hoverCell = null;   // {col,row,id}
    let lastClick = null;

    function resizeCanvas() {
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const rect = canvas.getBoundingClientRect();
      canvas.width  = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0); // dibujar en CSS px
      draw();
    }

    function getCellFromEvent(e) {
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left);
      const y = (e.clientY - rect.top);

      // Canvas en CSS px
      const w = rect.width;
      const h = rect.height;

      // Convertimos a coordenadas lógicas de grid
      const col = Math.floor((x / w) * COLS);
      const row = Math.floor((y / h) * ROWS);

      if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return null;

      const id = row * COLS + col; // 0..499999
      return { col, row, id };
    }

    function draw() {
      const rect = canvas.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;

      // Fondo limpio
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, w, h);

      // (Opcional) Sin grid visible para que sea "limpio".
      // Si quieres una rejilla visible, dímelo y lo adapto.

      // Hover highlight (una sola celda, barato)
      if (hoverCell) {
        const cellW = w / COLS;
        const cellH = h / ROWS;
        const x = hoverCell.col * cellW;
        const y = hoverCell.row * cellH;

        ctx.fillStyle = 'rgba(0, 0, 0, 0.06)';
        ctx.fillRect(x, y, cellW, cellH);

        ctx.strokeStyle = 'rgba(0, 0, 0, 0.18)';
        ctx.lineWidth = 1;
        ctx.strokeRect(x + 0.5, y + 0.5, Math.max(0, cellW - 1), Math.max(0, cellH - 1));
      }

      // Marcador de último click (ligero)
      if (lastClick) {
        const cellW = w / COLS;
        const cellH = h / ROWS;
        const x = lastClick.col * cellW;
        const y = lastClick.row * cellH;

        ctx.strokeStyle = 'rgba(0, 120, 255, 0.9)';
        ctx.lineWidth = 2;
        ctx.strokeRect(x + 1, y + 1, Math.max(0, cellW - 2), Math.max(0, cellH - 2));
      }
    }

    canvas.addEventListener('mousemove', (e) => {
      hoverCell = getCellFromEvent(e);
      elHover.textContent = hoverCell ? `id ${hoverCell.id} (col ${hoverCell.col}, row ${hoverCell.row})` : '—';
      draw();
    });

    canvas.addEventListener('mouseleave', () => {
      hoverCell = null;
      elHover.textContent = '—';
      draw();
    });

    canvas.addEventListener('click', (e) => {
      const cell = getCellFromEvent(e);
      if (!cell) return;

      lastClick = cell;
      elClick.textContent = `id ${cell.id} (col ${cell.col}, row ${cell.row})`;

      // Aquí es donde podrías hacer algo “real”:
      // - abrir una URL según el id
      // - mostrar un panel
      // - guardar en backend, etc.
      // Ejemplo (desactivado):
      // window.open(`https://tu-dominio.com/zona/${cell.id}`, '_blank');

      draw();
    });

    // Touch (móvil)
    canvas.addEventListener('touchstart', (ev) => {
      const t = ev.touches[0];
      if (!t) return;
      const cell = getCellFromEvent(t);
      if (!cell) return;
      lastClick = cell;
      elClick.textContent = `id ${cell.id} (col ${cell.col}, row ${cell.row})`;
      draw();
    }, { passive: true });

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
  </script>
</body>
</html>
