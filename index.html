<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosaico Pro 50k - Sistema de Anuncios</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            font-family: sans-serif;
        }

        /* Contenedor relativo para que las fotos se posicionen respecto a él */
        #contenedor-mosaico {
            display: flex;
            flex-wrap: wrap; 
            width: 100vw;    
            background-color: #fff;
            position: relative; 
            align-content: flex-start;
            touch-action: manipulation;
        }

        .espacio {
            width: 10px;      
            height: 10px;     
            box-sizing: border-box;
            background-color: #fff; 
            border: 0.1px solid #eee;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3px;
            color: #ccc;
            user-select: none;
        }

        .espacio:hover {
            background-color: #000;
            color: #fff;
            cursor: pointer;
        }

        /* Clase para las fotos reales que subas */
        .foto-anuncio {
            position: absolute;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            outline: 1px solid #000;
            z-index: 10;
            pointer-events: auto;
        }

        .foto-anuncio:hover {
            outline: 2px solid #ff00ff;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="contenedor-mosaico"></div>

    <script>
        const totalEspacios = 50000;
        const contenedor = document.getElementById('contenedor-mosaico');
        const tamañoLote = 5000; 
        let generados = 0;

        function generarMosaico() {
            function renderBatch() {
                const fragmento = document.createDocumentFragment();
                const limite = Math.min(generados + tamañoLote, totalEspacios);

                for (let i = generados + 1; i <= limite; i++) {
                    const div = document.createElement('div');
                    div.className = 'espacio';
                    div.innerText = i;
                    // Al hacer clic, activamos el sistema de "subida"
                    div.onclick = () => solicitarImagen(div, i);
                    fragmento.appendChild(div);
                }

                contenedor.appendChild(fragmento);
                generados = limite;
                if (generados < totalEspacios) requestAnimationFrame(renderBatch);
            }
            renderBatch();
        }

        function solicitarImagen(elemento, id) {
            const url = prompt("Introduce la URL de la imagen:");
            if (!url) return;

            const ancho = parseInt(prompt("¿Cuántos cuadros de ANCHO? (Ej: 10 para 100px)", "10"));
            const alto = parseInt(prompt("¿Cuántos cuadros de ALTO? (Ej: 5 para 50px)", "5"));

            if (isNaN(ancho) || isNaN(alto)) return;

            // Calculamos la posición exacta basándonos en el cuadro clicado
            const rect = elemento.getBoundingClientRect();
            const scrollLeft = window.pageXOffset || document.documentElement.scrollLeft;
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;

            const foto = document.createElement('div');
            foto.className = 'foto-anuncio';
            foto.style.backgroundImage = `url('${url}')`;
            
            // Posición basada en coordenadas del cuadro
            foto.style.left = (elemento.offsetLeft) + "px";
            foto.style.top = (elemento.offsetTop) + "px";
            
            // Tamaño basado en la cantidad de cuadros
            foto.style.width = (ancho * 10) + "px";
            foto.style.height = (alto * 10) + "px";

            foto.title = `Anuncio en cuadro ${id}`;
            contenedor.appendChild(foto);
        }

        window.onload = generarMosaico;
    </script>
</body>
</html>
