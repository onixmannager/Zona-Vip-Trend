<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2M Píxeles - 500k Bloques</title>
    <style>
        body { 
            margin: 0; background: #000; color: #0f0; 
            font-family: monospace; overflow: hidden; height: 100vh;
        }
        header { 
            position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.9);
            z-index: 100; text-align: center; padding: 10px 0; border-bottom: 1px solid #333;
        }
        #viewport {
            width: 100vw; height: 100vh;
            cursor: grab; touch-action: none;
            display: flex; align-items: center; justify-content: center;
        }
        /* El lienzo donde ocurre la magia */
        #canvas-wrapper {
            transform-origin: center;
            will-change: transform;
        }
        canvas {
            background: #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            image-rendering: pixelated;
        }
        #stats {
            position: fixed; bottom: 10px; left: 10px;
            background: rgba(0,0,0,0.8); padding: 5px 10px;
            font-size: 10px; pointer-events: none; border-radius: 4px;
        }
    </style>
</head>
<body>

<header>
    <div style="font-size: 14px;">2,000,000 PÍXELES TOTALES</div>
    <div style="font-size: 10px; color: #888;">500,000 bloques de 2x2px</div>
</header>

<div id="viewport">
    <div id="canvas-wrapper">
        <canvas id="mainCanvas"></canvas>
    </div>
</div>

<div id="stats">
    BLOQUES: 500,000 | ID: <span id="bid">-</span>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const wrapper = document.getElementById('canvas-wrapper');
    const bidDisplay = document.getElementById('bid');

    // CONFIGURACIÓN EXACTA
    const COLS = 500;
    const ROWS = 1000;
    const BLOCK_SIZE = 2; // Cada bloque es 2x2 píxeles
    const WIDTH = COLS * BLOCK_SIZE; // 1000px
    const HEIGHT = ROWS * BLOCK_SIZE; // 2000px

    canvas.width = WIDTH;
    canvas.height = HEIGHT;

    // Estado de la cámara
    let scale = 0.5;
    let translateX = 0;
    let translateY = 0;

    // Dibujar fondo blanco inicial
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0, 0, WIDTH, HEIGHT);

    function updateTransform() {
        wrapper.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
    }

    // --- LÓGICA TÁCTIL Y RATÓN ---
    let isDragging = false;
    let lastX, lastY;

    const startAction = (x, y) => {
        isDragging = true;
        lastX = x; lastY = y;
    };

    const moveAction = (x, y) => {
        if (!isDragging) return;
        translateX += x - lastX;
        translateY += y - lastY;
        lastX = x; lastY = y;
        updateTransform();
    };

    // Eventos Mouse
    window.onmousedown = (e) => startAction(e.clientX, e.clientY);
    window.onmousemove = (e) => moveAction(e.clientX, e.clientY);
    window.onmouseup = () => isDragging = false;

    // Eventos Touch (Móvil)
    window.ontouchstart = (e) => startAction(e.touches[0].clientX, e.touches[0].clientY);
    window.ontouchmove = (e) => {
        if (e.touches.length === 1) moveAction(e.touches[0].clientX, e.touches[0].clientY);
        // Zoom con dos dedos (Pinch) simplificado
        if (e.touches.length === 2) {
            scale = Math.max(0.2, Math.min(scale + 0.01, 10));
            updateTransform();
        }
    };
    window.ontouchend = () => isDragging = false;

    // Zoom Rueda
    window.onwheel = (e) => {
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        scale = Math.max(0.1, Math.min(scale * delta, 15));
        updateTransform();
    };

    // Detectar Bloque al hacer clic/toque
    canvas.onclick = (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) / scale;
        const y = (e.clientY - rect.top) / scale;
        
        const bX = Math.floor(x / BLOCK_SIZE);
        const bY = Math.floor(y / BLOCK_SIZE);
        
        if (bX >= 0 && bX < COLS && bY >= 0 && bY < ROWS) {
            const id = (bY * COLS) + bX + 1;
            bidDisplay.innerText = id.toLocaleString();
            
            // Pintar de color aleatorio al tocar
            ctx.fillStyle = `hsl(${Math.random() * 360}, 70%, 50%)`;
            ctx.fillRect(bX * BLOCK_SIZE, bY * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
        }
    };

    updateTransform();
</script>
</body>
</html>
