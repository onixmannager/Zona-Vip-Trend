<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosaico 500k - Vertical</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            /* Evitamos el scroll horizontal a nivel de cuerpo */
            overflow-x: hidden; 
            display: flex;
            justify-content: center;
        }

        #contenedor-mosaico {
            display: flex;
            flex-wrap: wrap; /* Esto hace que al llegar al borde, bajen a la siguiente línea */
            width: 100vw;    /* Ocupa todo el ancho de la pantalla */
            max-width: 100%; /* Asegura que no se pase en móviles */
            background-color: #1a1a1a;
        }

        .espacio {
            width: 20px;
            height: 20px;
            box-sizing: border-box;
            border: 1px solid #333; /* Borde sutil para distinguir los cuadros */
            flex-shrink: 0;         /* Evita que los cuadros se encojan */
        }

        /* Efecto visual al pasar el ratón (opcional) */
        .espacio:hover {
            background-color: #444;
        }
    </style>
</head>
<body>

    <div id="contenedor-mosaico"></div>

    <script>
        const totalEspacios = 500000;
        const contenedor = document.getElementById('contenedor-mosaico');

        // Función para generar los elementos en bloques para no bloquear el navegador
        function generarMosaico() {
            const fragmento = document.createDocumentFragment();
            const tamañoBloque = 10000; // Insertamos de 10k en 10k

            for (let i = 0; i < totalEspacios; i++) {
                const div = document.createElement('div');
                div.className = 'espacio';
                fragmento.appendChild(div);

                // Cada vez que completamos un bloque, lo inyectamos al DOM
                if ((i + 1) % tamañoBloque === 0) {
                    contenedor.appendChild(fragmento);
                }
            }
            // Inyectar el resto si queda algo
            contenedor.appendChild(fragmento);
        }

        // Ejecutar la generación
        generarMosaico();
    </script>
</body>
</html>
