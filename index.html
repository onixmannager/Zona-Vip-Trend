<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosaico 500k - 10x10 Numerado</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            overflow-x: hidden; 
            display: flex;
            justify-content: center;
            font-family: sans-serif;
        }

        #contenedor-mosaico {
            display: flex;
            flex-wrap: wrap; 
            width: 100vw;    
            background-color: #fff;
            align-content: flex-start;
            /* Permite zoom manual y scroll, pero evita zoom automático por clic */
            touch-action: manipulation;
        }

        .espacio {
            width: 10px;      
            height: 10px;     
            box-sizing: border-box;
            background-color: #fff; 
            border: 0.1px solid #eee;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3px;
            color: #ccc;
            user-select: none;
        }

        .espacio:hover {
            background-color: #000;
            color: #fff;
            z-index: 5;
        }

        /* Color temporal al tocar en móviles */
        .espacio:active {
            background-color: #ff00ff;
        }
    </style>
</head>
<body>

    <div id="contenedor-mosaico"></div>

    <script>
        const totalEspacios = 500000;
        const contenedor = document.getElementById('contenedor-mosaico');
        const tamañoLote = 10000; // Procesamos de 10k en 10k
        let generados = 0;

        function generarMosaico() {
            function renderBatch() {
                const fragmento = document.createDocumentFragment();
                const limite = Math.min(generados + tamañoLote, totalEspacios);

                for (let i = generados + 1; i <= limite; i++) {
                    const div = document.createElement('div');
                    div.className = 'espacio';
                    div.innerText = i;
                    fragmento.appendChild(div);
                }

                contenedor.appendChild(fragmento);
                generados = limite;

                if (generados < totalEspacios) {
                    // Usamos requestAnimationFrame para dejar que el navegador respire
                    requestAnimationFrame(renderBatch);
                }
            }

            renderBatch();
        }

        window.onload = generarMosaico;
    </script>
</body>
</html>
