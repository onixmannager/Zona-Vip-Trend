<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid 500K</title>

<style>
  body {
    margin: 0;
    background: #111;
    overflow: auto;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(1000, 25px);
    width: max-content;
  }

  .cell {
    width: 25px;
    height: 25px;
    box-sizing: border-box;
    border: 1px solid rgba(0,0,0,0.15);
    background: #eee;
  }

  .cell:nth-child(even) {
    background: #ddd;
  }

  .cell:hover {
    outline: 2px solid red;
    z-index: 2;
  }
</style>
</head>
<body>

<div class="grid" id="grid"></div>

<script>
const grid = document.getElementById("grid");
const total = 500000;

// ⚠️ Crear en bloques para no congelar
let created = 0;
const batch = 2000;

function createCells() {
  const fragment = document.createDocumentFragment();

  for (let i = 0; i < batch && created < total; i++) {
    const div = document.createElement("div");
    div.className = "cell";

    div.addEventListener("click", () => {
      alert("Celda #" + (created - i));
    });

    fragment.appendChild(div);
    created++;
  }

  grid.appendChild(fragment);

  if (created < total) {
    requestAnimationFrame(createCells);
  }
}

createCells();
</script>

</body>
</html>
