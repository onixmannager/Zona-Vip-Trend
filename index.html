<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Million Dollar Homepage - Bloques 2x2</title>
    <style>
        body { 
            background: #1a1a1a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; flex-direction: column; align-items: center; margin: 0; height: 100vh;
        }

        header { padding: 10px; text-align: center; }

        #viewport {
            width: 95vw; height: 80vh;
            border: 2px solid #555;
            overflow: auto; /* Permite scroll si el zoom es grande */
            background: #ccc;
            position: relative;
        }

        #grid-container {
            width: 1000px; height: 1000px;
            background-color: white;
            display: grid;
            /* Definimos 500 columnas y filas de 2px cada una */
            grid-template-columns: repeat(500, 2px);
            grid-template-rows: repeat(500, 2px);
            
            /* DIBUJO DE LAS LÍNEAS (Cada 2px) */
            background-image: 
                linear-gradient(to right, rgba(0,0,0,0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 2px 2px;
            
            transform-origin: 0 0;
            transition: transform 0.05s ease-out;
        }

        /* Estilo para cuando pasas el mouse por encima de un bloque */
        .pixel-block:hover {
            background-color: rgba(0, 0, 255, 0.5);
        }
    </style>
</head>
<body>

    <header>
        <h1>Réplica de 500,000 Bloques (2x2px)</h1>
        <p>Usa la <b>rueda del ratón</b> para zoom y las <b>barras de desplazamiento</b> para moverte.</p>
    </header>

    <div id="viewport">
        <div id="grid-container" id="canvas">
            </div>
    </div>

    <script>
        const el = document.getElementById("grid-container");
        let scale = 1;

        // Lógica de Zoom
        window.addEventListener('wheel', (e) => {
            if (e.ctrlKey || e.target.closest('#viewport')) {
                e.preventDefault();
                const delta = e.deltaY > 0 ? -0.2 : 0.2;
                scale = Math.min(Math.max(0.5, scale + delta), 15); // Zoom hasta 15x para ver los 2px
                el.style.transform = `scale(${scale})`;
            }
        }, { passive: false });
    </script>
</body>
</html>
