<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosaico 500k</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a; /* Fondo oscuro para que resalten los huecos */
            display: flex;
            justify-content: center;
        }

        #contenedor-mosaico {
            display: grid;
            /* Creamos una cuadrícula de 1000 columnas de 10px cada una */
            grid-template-columns: repeat(1000, 10px);
            /* El ancho total será de 10,000px (1000 col x 10px) */
            width: 10000px; 
            background-color: #333;
        }

        .espacio {
            width: 10px;
            height: 10px;
            outline: 1px solid #444; /* Un borde sutil para ver los cuadros vacíos */
            box-sizing: border-box;
        }

        /* Ejemplo de cómo se vería una imagen dentro */
        .espacio img {
            width: 10px;
            height: 10px;
            display: block;
        }
    </style>
</head>
<body>

    <div id="contenedor-mosaico"></div>

    <script>
        const totalEspacios = 500000;
        const contenedor = document.getElementById('contenedor-mosaico');

        // Usamos un DocumentFragment para mejorar el rendimiento al insertar
        const fragmento = document.createDocumentFragment();

        for (let i = 0; i < totalEspacios; i++) {
            const div = document.createElement('div');
            div.className = 'espacio';
            
            // Aquí es donde iría tu lógica de imagen. 
            // Por ahora están vacíos.
            
            fragmento.appendChild(div);

            // Insertamos cada 10,000 elementos para no congelar el navegador
            if (i % 10000 === 0) {
                contenedor.appendChild(fragmento);
            }
        }
        
        // Insertar el resto
        contenedor.appendChild(fragmento);
    </script>
</body>
</html>
