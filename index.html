<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosaico 500k - 10x10 Vertical</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000; /* Fondo negro total */
            overflow-x: hidden;    /* Bloquea scroll horizontal */
            display: flex;
            justify-content: center;
        }

        #contenedor-mosaico {
            display: flex;
            flex-wrap: wrap;       /* Los cuadros bajan al no caber en la fila */
            width: 100vw;          /* Ancho total de la ventana */
            background-color: #111;
        }

        .espacio {
            width: 10px;           /* Tamaño solicitado: 10px */
            height: 10px;          /* Tamaño solicitado: 10px */
            box-sizing: border-box;
            border: 0.1px solid #222; /* Borde muy fino para distinguir los huecos */
            flex-shrink: 0;        /* Impide que los cuadros se deformen */
        }

        /* Efecto al pasar el ratón para confirmar que están ahí */
        .espacio:hover {
            background-color: #00ff00; 
        }
    </style>
</head>
<body>

    <div id="contenedor-mosaico"></div>

    <script>
        const totalEspacios = 500000;
        const contenedor = document.getElementById('contenedor-mosaico');

        function generarMosaico() {
            const fragmento = document.createDocumentFragment();
            const tamañoBloque = 5000; // Bloques más pequeños para mayor fluidez inicial

            for (let i = 0; i < totalEspacios; i++) {
                const div = document.createElement('div');
                div.className = 'espacio';
                fragmento.appendChild(div);

                // Insertar en el DOM por partes para no congelar la pestaña
                if ((i + 1) % tamañoBloque === 0) {
                    contenedor.appendChild(fragmento);
                }
            }
            // Insertar los últimos elementos restantes
            contenedor.appendChild(fragmento);
        }

        // Iniciar la creación
        generarMosaico();
    </script>
</body>
</html>
