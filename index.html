<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosaico 20k - 10x10</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            /* Bloqueamos el scroll horizontal */
            overflow-x: hidden; 
            display: flex;
            justify-content: center;
        }

        #contenedor-mosaico {
            display: flex;
            flex-wrap: wrap; 
            /* Ocupa el ancho total de la pantalla para que los cuadros bajen */
            width: 100vw;    
            background-color: #000;
            /* Alineamos al inicio para evitar huecos raros */
            align-content: flex-start;
        }

        .espacio {
            /* TAMAÑO CORREGIDO: 10x10 píxeles */
            width: 10px;      
            height: 10px;     
            box-sizing: border-box;
            background-color: #1a1a1a; 
            /* Borde muy fino para que se distingan los cuadros */
            border: 0.1px solid #111;
            flex-shrink: 0;
        }

        /* Efecto visual al pasar el ratón o tocar en móvil */
        .espacio:hover {
            background-color: #ff00ff;
        }
    </style>
</head>
<body>

    <div id="contenedor-mosaico"></div>

    <script>
        const totalEspacios = 20000; 
        const contenedor = document.getElementById('contenedor-mosaico');

        function generarMosaico() {
            let generados = 0;
            // Lote de 5000 para que la carga sea fluida
            const lote = 5000; 

            function dibujar() {
                const fragmento = document.createDocumentFragment();
                
                for (let i = 0; i < lote && generados < totalEspacios; i++) {
                    const div = document.createElement('div');
                    div.className = 'espacio';
                    fragmento.appendChild(div);
                    generados++;
                }
                
                contenedor.appendChild(fragmento);

                if (generados < totalEspacios) {
                    requestAnimationFrame(dibujar);
                }
            }
            
            dibujar();
        }

        // Ejecutar después de que cargue el DOM
        window.addEventListener('DOMContentLoaded', generarMosaico);
    </script>
</body>
</html>
