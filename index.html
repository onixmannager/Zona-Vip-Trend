<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Reclica de Million Dollar Homepage</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin: 20px;
        }

        /* Contenedor principal de 1000x1000 píxeles */
        #grid-container {
            width: 1000px;
            height: 1000px;
            background-color: white;
            border: 2px solid #000;
            display: grid;
            /* Creamos 100 columnas y 100 filas de 10px cada una */
            grid-template-columns: repeat(100, 10px);
            grid-template-rows: repeat(100, 10px);
            position: relative;
        }

        /* Estilo de los anuncios (celdas ocupadas) */
        .ad-space {
            background-color: #ff0000; /* Color de ejemplo */
            cursor: pointer;
            border: 0.1px solid rgba(0,0,0,0.05);
        }

        .ad-space:hover {
            outline: 2px solid blue;
            z-index: 10;
        }

        /* Tooltip simple */
        #info {
            margin-top: 10px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

    <header>
        <h1>The Million Dollar Homepage Replica</h1>
        <p>1,000,000 píxeles • $1 por píxel • ¡Compra tu espacio!</p>
    </header>

    <div id="grid-container">
        <div class="ad-space" 
             style="grid-column: 1 / span 5; grid-row: 1 / span 5;" 
             title="Mi Anuncio - www.ejemplo.com">
        </div>
    </div>

    <p id="info">Pasa el mouse sobre los píxeles</p>

</body>
</html>
