<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosaico 500k - 5x5 Vertical</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow-x: hidden; /* Prohibido el scroll horizontal */
            display: flex;
            justify-content: center;
        }

        #contenedor-mosaico {
            display: flex;
            flex-wrap: wrap;    /* Los cuadros saltan de línea automáticamente */
            width: 100vw;       /* Ajuste perfecto al ancho de pantalla */
            background-color: #050505;
        }

        .espacio {
            width: 5px;         /* Tamaño solicitado: 5px */
            height: 5px;        /* Tamaño solicitado: 5px */
            box-sizing: border-box;
            border: 0.1px solid #1a1a1a; /* Borde ultra fino */
            flex-shrink: 0;
        }

        /* Efecto de luz al pasar el ratón */
        .espacio:hover {
            background-color: #ffffff;
        }
    </style>
</head>
<body>

    <div id="contenedor-mosaico"></div>

    <script>
        const totalEspacios = 500000;
        const contenedor = document.getElementById('contenedor-mosaico');

        function generarMosaico() {
            const fragmento = document.createDocumentFragment();
            const tamañoBloque = 10000; // Procesamos de 10k en 10k para eficiencia

            for (let i = 0; i < totalEspacios; i++) {
                const div = document.createElement('div');
                div.className = 'espacio';
                fragmento.appendChild(div);

                // Inyectar al DOM por tramos para evitar que la pestaña se bloquee
                if ((i + 1) % tamañoBloque === 0) {
                    contenedor.appendChild(fragmento);
                }
            }
            // Inyectar el sobrante
            contenedor.appendChild(fragmento);
        }

        // Ejecutar proceso
        generarMosaico();
    </script>
</body>
</html>
