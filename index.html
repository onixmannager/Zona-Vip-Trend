<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mosaico 500k - Pro Móvil</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden; /* Evita rebotes extraños en móvil */
            font-family: sans-serif;
            touch-action: none; /* Importante para controlar nosotros el zoom */
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: flex-start;
            align-content: flex-start;
            flex-wrap: wrap;
            background-color: #000;
            transform-origin: 0 0;
            will-change: transform;
        }

        .espacio {
            width: 3px;
            height: 3px;
            background-color: #1a1a1a;
            box-sizing: border-box;
            border: 0.1px solid #000;
            flex-shrink: 0;
        }

        /* Color al tocar/pasar el ratón */
        .espacio.active {
            background-color: #00ffcc !important;
        }

        #ui {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="ui">Zoom: 100% | Pellizca para ampliar</div>
    <div id="canvas-container"></div>

    <script>
        const total = 500000;
        const contenedor = document.getElementById('canvas-container');
        const ui = document.getElementById('ui');

        let scale = 1;
        let pointX = 0;
        let pointY = 0;
        let start = { x: 0, y: 0 };

        // 1. GENERACIÓN OPTIMIZADA
        function inicializar() {
            let creados = 0;
            const fragmento = document.createDocumentFragment();
            
            function renderBatch() {
                for (let i = 0; i < 15000 && creados < total; i++) {
                    const div = document.createElement('div');
                    div.className = 'espacio';
                    // Pintar al tocar o pasar el ratón
                    div.addEventListener('pointerover', () => div.classList.add('active'));
                    fragmento.appendChild(div);
                    creados++;
                }
                contenedor.appendChild(fragmento);
                if (creados < total) requestAnimationFrame(renderBatch);
            }
            renderBatch();
        }

        // 2. LÓGICA DE ZOOM Y MOVIMIENTO (MÓVIL Y PC)
        let evCache = [];
        let prevDiff = -1;

        contenedor.onpointerdown = (e) => {
            evCache.push(e);
        };

        contenedor.onpointermove = (e) => {
            // Actualizar caché de puntos (para multi-touch)
            const index = evCache.findIndex((item) => item.pointerId === e.pointerId);
            evCache[index] = e;

            // Si hay dos dedos: ZOOM
            if (evCache.length === 2) {
                const curDiff = Math.hypot(evCache[0].clientX - evCache[1].clientX, evCache[0].clientY - evCache[1].clientY);

                if (prevDiff > 0) {
                    if (curDiff > prevDiff) scale += 0.05;
                    if (curDiff < prevDiff) scale -= 0.05;
                }
                prevDiff = curDiff;
                actualizarTransform();
            }
        };

        contenedor.onpointerup = (e) => {
            evCache = evCache.filter((item) => item.pointerId !== e.pointerId);
            if (evCache.length < 2) prevDiff = -1;
        };

        // Zoom con rueda también para PC
        window.addEventListener('wheel', (e) => {
            scale += e.deltaY * -0.001;
            actualizarTransform();
        }, { passive: false });

        function actualizarTransform() {
            scale = Math.min(Math.max(0.3, scale), 15); // Límites de zoom
            contenedor.style.transform = `scale(${scale})`;
            ui.innerText = `Zoom: ${Math.round(scale * 100)}%`;
        }

        inicializar();
    </script>
</body>
</html>
