<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zona VIP Trends - Chat Soporte</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
  * {box-sizing: border-box; margin:0; padding:0;}
  body {
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(135deg, #111 0%, #1c1c1c 100%);
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  #chat-container {
    width: 400px;
    max-width: 95%;
    height: 600px;
    border-radius: 15px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 20px rgba(212,175,55,0.7);
    border: 2px solid #d4af37;
    background-color: #222;
  }

  #chat-header {
    background-color: #333;
    padding: 15px;
    text-align: center;
    font-weight: bold;
    color: #d4af37;
    font-size: 18px;
  }

  #chat-body {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    background-color: #111;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .message {
    max-width: 80%;
    padding: 10px 15px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: fadeIn 0.3s ease;
  }

  .message.bot {
    background-color: #f5f5f5;
    color: #111;
    align-self: flex-start;
  }

  .message.user {
    background-color: #d4af37;
    color: #111;
    align-self: flex-end;
    justify-content: flex-end;
  }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background-color: #d4af37;
    display: inline-block;
  }

  #chat-input-container {
    display: flex;
    border-top: 2px solid #d4af37;
  }

  #chat-input {
    flex: 1;
    padding: 12px;
    border: none;
    outline: none;
    font-size: 14px;
    background-color: #111;
    color: #fff;
  }

  #send-btn {
    background-color: #d4af37;
    border: none;
    padding: 12px 18px;
    cursor: pointer;
    font-weight: bold;
    color: #111;
    transition: background 0.3s;
  }

  #send-btn:hover {
    background-color: #b8972d;
  }

  #quick-buttons {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-bottom: 5px;
  }

  .quick-btn {
    background-color: #333;
    color: #d4af37;
    border: 1px solid #d4af37;
    border-radius: 12px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
    transition: 0.2s;
  }

  .quick-btn:hover {
    background-color: #d4af37;
    color: #111;
  }

  @keyframes fadeIn {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1; transform: translateY(0);}
  }
</style>
</head>
<body>
<div id="chat-container">
  <div id="chat-header">ZonaVipTrendsBot</div>
  <div id="chat-body">
    <div class="message bot">
      <div class="avatar"></div>
      ¡Hola! Soy tu asistente ZonaVIP Trends. Pregúntame sobre la plataforma, premios y cómo participar.
    </div>
  </div>
  <div id="quick-buttons">
    <div class="quick-btn">Quiénes somos</div>
    <div class="quick-btn">Qué ofrecemos</div>
    <div class="quick-btn">Cómo participar</div>
    <div class="quick-btn">Premios</div>
  </div>
  <div id="chat-input-container">
    <input type="text" id="chat-input" placeholder="Escribe tu mensaje...">
    <button id="send-btn">Enviar</button>
  </div>
</div>

<script>
const chatBody = document.getElementById('chat-body');
const chatInput = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');
const quickButtons = document.querySelectorAll('.quick-btn');

// Mensajes predefinidos
const responses = {
  "quienes somos": "Somos una agencia de publicidad digital que combina creatividad, tecnología y gamificación para conectar marcas y creadores.",
  "qué ofrecemos": "Ofrecemos visibilidad, conexión y participación en premios y campañas activas dentro de nuestra plataforma viral.",
  "cómo participar": "Selecciona tu espacio en la plataforma, comparte tu link y empieza a formar parte del mosaico viral.",
  "premios": "Los premios se distribuyen en tu red social en 3 niveles, incentivando la viralización y participación activa.",
  "default": "Disculpa, no entiendo tu pregunta. Usa los botones rápidos o escribe 'quienes somos', 'qué ofrecemos', 'cómo participar' o 'premios'."
};

function addMessage(text, type){
  const msg = document.createElement('div');
  msg.classList.add('message', type);
  msg.innerHTML = type==='bot'? '<div class="avatar"></div>'+text : text;
  chatBody.appendChild(msg);
  chatBody.scrollTop = chatBody.scrollHeight;
}

function botResponse(msg){
  const response = responses[msg.toLowerCase()] || responses['default'];
  addMessage(response, 'bot');
}

// Enviar mensaje
sendBtn.addEventListener('click', ()=> {
  const msg = chatInput.value.trim();
  if(!msg) return;
  addMessage(msg, 'user');
  botResponse(msg);
  chatInput.value='';
});

chatInput.addEventListener('keypress', (e)=> {
  if(e.key==='Enter') sendBtn.click();
});

// Botones rápidos
quickButtons.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const text = btn.textContent;
    addMessage(text, 'user');
    botResponse(text);
  });
});
</script>
</body>
</html>
