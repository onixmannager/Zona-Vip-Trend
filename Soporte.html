<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
<title>Zona VIP Trends · Soporte IA Premium</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════ */
:root {
  --ink:      #06070d;
  --ink2:     #0a0c16;
  --ink3:     #0d1020;
  --surface:  #111420;
  --surface2: #161a28;
  --surface3: #1b2033;
  --gold:     #d4af37;
  --gold-lt:  #f0d06a;
  --gold-dk:  #9a7c1e;
  --gold-dim: rgba(212,175,55,.10);
  --cream:    #f5edcc;
  --text:     #e8ecf8;
  --muted:    #6b7590;
  --muted2:   #9aa3bc;
  --line:     rgba(255,255,255,.055);
  --line-g:   rgba(212,175,55,.18);
  --ok:       #22c55e;
  --shadow:   0 40px 100px rgba(0,0,0,.75), 0 8px 24px rgba(0,0,0,.4);
  --ff-d:'Playfair Display', Georgia, serif;
  --ff-b:'Outfit', system-ui, sans-serif;
  --ease:cubic-bezier(.4,0,.2,1);
  --ease-s:cubic-bezier(.34,1.56,.64,1);
}

/* ═══════════════════════════════════════════
   RESET
═══════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;}
html{height:100%;}
body{
  font-family:var(--ff-b);
  background:var(--ink);
  color:var(--text);
  height:100dvh;
  display:flex;align-items:center;justify-content:center;
  padding:16px;
  overflow:hidden;
}
::selection{background:rgba(212,175,55,.28);color:#fff;}

/* ═══════════════════════════════════════════
   AMBIENT LAYERS
═══════════════════════════════════════════ */
.bg-canvas{
  position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
}
.orb{
  position:absolute;border-radius:50%;filter:blur(100px);
  animation:orbDrift 16s ease-in-out infinite alternate;
}
.orb-1{
  width:520px;height:520px;top:-180px;left:-150px;
  background:radial-gradient(circle,rgba(212,175,55,.13) 0%,transparent 70%);
  animation-delay:0s;
}
.orb-2{
  width:380px;height:380px;bottom:-120px;right:-100px;
  background:radial-gradient(circle,rgba(50,70,210,.09) 0%,transparent 70%);
  animation-delay:-6s;
}
.orb-3{
  width:280px;height:280px;top:45%;right:5%;
  background:radial-gradient(circle,rgba(212,175,55,.07) 0%,transparent 70%);
  animation-delay:-11s;
}
@keyframes orbDrift{
  from{transform:translate(0,0) scale(1);}
  to{transform:translate(28px,18px) scale(1.10);}
}
.bg-grid{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(212,175,55,.022) 1px,transparent 1px),
    linear-gradient(90deg,rgba(212,175,55,.022) 1px,transparent 1px);
  background-size:46px 46px;
  mask-image:radial-gradient(ellipse 75% 75% at 50% 50%,black 0%,transparent 100%);
}
/* floating particles */
.particles{position:fixed;inset:0;z-index:0;pointer-events:none;}
.par{
  position:absolute;border-radius:50%;
  background:var(--gold);
  animation:parFloat linear infinite;
  opacity:0;
}
@keyframes parFloat{
  0%{opacity:0;transform:translateY(0) scale(0);}
  10%{opacity:.5;}
  90%{opacity:.15;}
  100%{opacity:0;transform:translateY(-120px) scale(1.4);}
}

/* ═══════════════════════════════════════════
   SHELL
═══════════════════════════════════════════ */
.shell{
  position:relative;z-index:2;
  width:100%;max-width:880px;
  height:100%;max-height:840px;
  display:flex;flex-direction:column;
  border-radius:28px;
  border:1px solid var(--line-g);
  background:rgba(9,11,20,.93);
  backdrop-filter:blur(28px) saturate(1.5);
  box-shadow:var(--shadow);
  overflow:hidden;
  animation:shellIn .65s var(--ease) both;
}
@keyframes shellIn{
  from{opacity:0;transform:translateY(30px) scale(.97);}
  to{opacity:1;transform:translateY(0) scale(1);}
}
/* top accent line — animated */
.shell::after{
  content:'';
  position:absolute;top:0;left:0;right:0;height:1px;z-index:10;
  background:linear-gradient(90deg,
    transparent 0%,
    var(--gold-dk) 20%,
    var(--gold) 40%,
    var(--gold-lt) 50%,
    var(--gold) 60%,
    var(--gold-dk) 80%,
    transparent 100%
  );
  background-size:200% 100%;
  animation:topLine 3s linear infinite;
}
@keyframes topLine{
  from{background-position:200% 0;}
  to{background-position:-200% 0;}
}
/* inner grain */
.shell::before{
  content:'';position:absolute;inset:0;z-index:1;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:.016;border-radius:inherit;
}

/* ═══════════════════════════════════════════
   HEADER
═══════════════════════════════════════════ */
.hdr{
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  padding:18px 22px;
  background:linear-gradient(180deg,rgba(18,14,5,.96) 0%,rgba(9,11,20,.88) 100%);
  border-bottom:1px solid var(--line-g);
  flex-shrink:0;position:relative;z-index:5;
  animation:slideDown .5s var(--ease) .1s both;
}
@keyframes slideDown{
  from{opacity:0;transform:translateY(-14px);}
  to{opacity:1;transform:translateY(0);}
}
.hdr-left{display:flex;align-items:center;gap:14px;min-width:0;}

/* logo */
.logo-wrap{position:relative;flex-shrink:0;}
.logo{
  width:52px;height:52px;border-radius:16px;
  background:linear-gradient(135deg,var(--gold-lt) 0%,var(--gold) 50%,var(--gold-dk) 100%);
  display:flex;align-items:center;justify-content:center;
  color:#130e02;font-size:1.4rem;font-weight:900;
  position:relative;overflow:hidden;
  box-shadow:0 0 0 1px rgba(212,175,55,.45), 0 8px 30px rgba(212,175,55,.25);
  animation:logoGlow 3.5s ease-in-out infinite;
}
@keyframes logoGlow{
  0%,100%{box-shadow:0 0 0 1px rgba(212,175,55,.4),0 8px 30px rgba(212,175,55,.22);}
  50%{box-shadow:0 0 0 2px rgba(212,175,55,.65),0 8px 44px rgba(212,175,55,.42);}
}
.logo-sweep{
  position:absolute;top:0;left:-80%;width:60%;height:100%;
  background:linear-gradient(105deg,transparent 35%,rgba(255,255,255,.35) 50%,transparent 65%);
  animation:logoSweep 3.8s ease-in-out infinite;
}
@keyframes logoSweep{0%,65%,100%{left:-80%;}32%{left:130%;}}
.logo-symbol{position:relative;z-index:1;}

.presence{
  position:absolute;bottom:-3px;right:-3px;
  width:14px;height:14px;border-radius:50%;
  background:var(--ok);border:2.5px solid var(--ink);
  animation:presIn .5s var(--ease-s) .6s both, presGlow 2.6s ease-in-out infinite 1s;
}
@keyframes presIn{from{transform:scale(0);}to{transform:scale(1);}}
@keyframes presGlow{
  0%,100%{box-shadow:0 0 0 3px rgba(34,197,94,.18);}
  50%{box-shadow:0 0 0 8px rgba(34,197,94,.05);}
}

/* brand text */
.brand{min-width:0;}
.brand-name{
  font-family:var(--ff-d);
  font-size:1.12rem;font-weight:700;
  letter-spacing:.015em;color:#fff;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.brand-sub{font-size:.77rem;color:var(--muted2);margin-top:2px;font-weight:400;}
.pills{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap;}
.pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 11px;border-radius:99px;font-size:.71rem;white-space:nowrap;
  border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);
  color:var(--muted2);
  animation:pillIn .4s var(--ease-s) both;
}
.pill:nth-child(1){animation-delay:.3s;}
.pill:nth-child(2){animation-delay:.4s;}
@keyframes pillIn{from{opacity:0;transform:translateX(-8px);}to{opacity:1;transform:translateX(0);}}
.pill-live{border-color:rgba(34,197,94,.22);background:rgba(34,197,94,.05);color:#4ade80;}
.pill-ai{border-color:var(--line-g);background:var(--gold-dim);color:var(--gold-lt);}
.pdot{width:6px;height:6px;border-radius:50%;}
.pill-live .pdot{background:var(--ok);animation:presGlow 2s infinite;}
.pill-ai .pdot{background:var(--gold);animation:logoGlow 2s infinite;}

/* header actions */
.hdr-right{display:flex;gap:8px;flex-shrink:0;}
.hbtn{
  border:1px solid var(--line);border-radius:12px;
  padding:9px 14px;background:rgba(255,255,255,.04);
  color:var(--muted2);cursor:pointer;
  transition:all .22s var(--ease);
  font-family:var(--ff-b);font-size:.82rem;font-weight:500;
  display:flex;align-items:center;gap:7px;
}
.hbtn:hover{
  background:var(--gold-dim);border-color:var(--line-g);
  color:var(--gold-lt);transform:translateY(-2px);
  box-shadow:0 4px 18px rgba(212,175,55,.12);
}
.hbtn svg{transition:transform .4s var(--ease);}
.hbtn:hover svg{transform:rotate(-180deg);}

/* ═══════════════════════════════════════════
   MESSAGES
═══════════════════════════════════════════ */
.msgs{
  flex:1;overflow-y:auto;
  padding:22px 20px 14px;
  display:flex;flex-direction:column;gap:16px;
  scroll-behavior:smooth;position:relative;
}
.msgs::-webkit-scrollbar{width:4px;}
.msgs::-webkit-scrollbar-track{background:transparent;}
.msgs::-webkit-scrollbar-thumb{background:rgba(212,175,55,.22);border-radius:99px;}

/* date row */
.date-row{
  display:flex;align-items:center;gap:12px;margin:4px 0;
  animation:fadeIn .4s var(--ease);
}
.date-row::before,.date-row::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,var(--line-g),transparent);
}
.date-row span{
  font-size:.68rem;color:var(--muted);
  letter-spacing:.09em;text-transform:uppercase;font-weight:500;white-space:nowrap;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

/* message wrapper */
.msg{
  display:flex;flex-direction:column;gap:5px;
  max-width:80%;
}
.msg.bot{align-self:flex-start;animation:msgBot .35s var(--ease-s) both;}
.msg.user{align-self:flex-end;animation:msgUser .3s var(--ease-s) both;}
@keyframes msgBot{
  from{opacity:0;transform:translateX(-18px) translateY(8px);}
  to{opacity:1;transform:translateX(0) translateY(0);}
}
@keyframes msgUser{
  from{opacity:0;transform:translateX(18px) translateY(8px);}
  to{opacity:1;transform:translateX(0) translateY(0);}
}

/* sender label */
.mwho{font-size:.67rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);padding:0 5px;}
.msg.user .mwho{text-align:right;color:var(--gold-dk);}

/* bubble */
.bubble{
  border-radius:20px;padding:15px 18px;
  border:1px solid var(--line);position:relative;overflow:hidden;
}
.msg.bot .bubble{
  background:linear-gradient(155deg,var(--surface) 0%,var(--ink3) 100%);
  border-color:rgba(255,255,255,.07);
  border-bottom-left-radius:5px;
}
/* gold inner glow */
.msg.bot .bubble::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(140deg,rgba(212,175,55,.07) 0%,transparent 50%);
}
/* shimmer on appear */
.msg.bot .bubble::after{
  content:'';position:absolute;top:0;left:-100%;
  width:55%;height:100%;pointer-events:none;
  background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,.05) 50%,transparent 70%);
  animation:bShimmer .55s var(--ease) both;
}
@keyframes bShimmer{from{left:-100%;}to{left:160%;}}

.msg.user .bubble{
  background:linear-gradient(145deg,var(--gold-lt) 0%,var(--gold) 50%,var(--gold-dk) 100%);
  color:#120d02;border-color:rgba(255,255,255,.15);
  border-bottom-right-radius:5px;
  box-shadow:0 6px 28px rgba(212,175,55,.22);
}

/* title */
.mtitle{
  font-family:var(--ff-d);font-size:.92rem;font-weight:700;
  color:var(--gold-lt);margin-bottom:9px;
  display:flex;align-items:center;gap:7px;
  position:relative;z-index:1;
}
.msg.user .mtitle{color:#130e03;}

/* text */
.mtext{
  font-size:.93rem;line-height:1.67;
  color:var(--text);position:relative;z-index:1;
}
.mtext b{color:var(--gold-lt);font-weight:600;}
.msg.user .mtext{color:#120d02;font-weight:500;}

/* ai badge */
.ai-badge{
  display:inline-flex;align-items:center;gap:5px;
  margin-top:11px;padding:3px 10px;border-radius:99px;
  border:1px solid rgba(212,175,55,.18);background:rgba(212,175,55,.07);
  font-size:.65rem;font-weight:600;letter-spacing:.06em;
  text-transform:uppercase;color:var(--gold-dk);
  position:relative;z-index:1;
}
.ai-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:logoGlow 1.8s infinite;}

/* chips */
.chips{
  display:flex;flex-wrap:wrap;gap:8px;margin-top:13px;
  position:relative;z-index:1;
}
.chip{
  border:1px solid rgba(212,175,55,.22);border-radius:99px;
  padding:7px 14px;background:rgba(212,175,55,.07);
  color:var(--gold-lt);font-size:.77rem;font-weight:600;
  cursor:pointer;transition:all .22s var(--ease);
  font-family:var(--ff-b);position:relative;overflow:hidden;
}
.chip::after{
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(105deg,transparent 30%,rgba(212,175,55,.14) 50%,transparent 70%);
  transform:translateX(-100%);transition:transform .4s var(--ease);
}
.chip:hover::after{transform:translateX(100%);}
.chip:hover{
  background:rgba(212,175,55,.18);border-color:rgba(212,175,55,.5);
  color:#fff3cc;transform:translateY(-2px);
  box-shadow:0 4px 20px rgba(212,175,55,.16);
}

/* stagger chips */
.chip:nth-child(1){animation:chipIn .28s var(--ease-s) .06s both;}
.chip:nth-child(2){animation:chipIn .28s var(--ease-s) .12s both;}
.chip:nth-child(3){animation:chipIn .28s var(--ease-s) .18s both;}
.chip:nth-child(4){animation:chipIn .28s var(--ease-s) .24s both;}
.chip:nth-child(5){animation:chipIn .28s var(--ease-s) .30s both;}
.chip:nth-child(6){animation:chipIn .28s var(--ease-s) .36s both;}
@keyframes chipIn{
  from{opacity:0;transform:translateY(10px) scale(.88);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

/* timestamp */
.mts{font-size:.66rem;color:var(--muted);padding:0 5px;}
.msg.user .mts{text-align:right;}

/* ── TYPING BUBBLE ── */
.typing-bbl{
  display:flex;align-items:center;gap:7px;
  padding:16px 20px !important;min-width:76px;
}
.tdot{
  width:8px;height:8px;border-radius:50%;
  background:var(--gold);opacity:.3;
  animation:tdot 1.4s infinite ease-in-out;
}
.tdot:nth-child(2){animation-delay:.18s;}
.tdot:nth-child(3){animation-delay:.36s;}
@keyframes tdot{
  0%,80%,100%{transform:scale(.65);opacity:.22;}
  40%{transform:scale(1.1);opacity:.95;}
}

/* ── SCROLL FAB ── */
.sfab{
  position:absolute;bottom:16px;right:18px;z-index:20;
  border:1px solid var(--line-g);border-radius:99px;
  padding:8px 16px;background:rgba(212,175,55,.11);
  color:var(--gold-lt);cursor:pointer;font-size:.74rem;font-weight:600;
  display:flex;align-items:center;gap:6px;font-family:var(--ff-b);
  backdrop-filter:blur(10px);box-shadow:0 6px 24px rgba(0,0,0,.3);
  transition:all .22s var(--ease);
  opacity:0;pointer-events:none;transform:translateY(8px);
}
.sfab.show{opacity:1;pointer-events:all;transform:translateY(0);}
.sfab:hover{background:rgba(212,175,55,.22);transform:translateY(-2px);}

/* ═══════════════════════════════════════════
   COMPOSER
═══════════════════════════════════════════ */
.composer{
  padding:14px 18px 18px;
  border-top:1px solid rgba(255,255,255,.05);
  background:linear-gradient(0deg,rgba(6,7,13,1) 0%,rgba(9,11,20,.82) 100%);
  flex-shrink:0;position:relative;z-index:5;
  animation:slideUp .5s var(--ease) .15s both;
}
@keyframes slideUp{
  from{opacity:0;transform:translateY(14px);}
  to{opacity:1;transform:translateY(0);}
}

.cmp-wrap{
  display:flex;gap:10px;align-items:flex-end;
  background:rgba(255,255,255,.035);
  border:1px solid rgba(255,255,255,.08);
  border-radius:20px;
  padding:10px 10px 10px 18px;
  transition:all .28s var(--ease);
  position:relative;
}
/* animated border on focus */
.cmp-wrap::before{
  content:'';position:absolute;inset:-1px;border-radius:21px;z-index:-1;
  background:conic-gradient(
    from var(--angle, 0deg),
    transparent 0%,
    var(--gold) 10%,
    var(--gold-lt) 20%,
    transparent 30%,
    transparent 100%
  );
  opacity:0;transition:opacity .35s;
  animation:rotateBorder 2.5s linear infinite;
}
@property --angle{syntax:"<angle>";initial-value:0deg;inherits:false;}
@keyframes rotateBorder{to{--angle:360deg;}}
.cmp-wrap:focus-within::before{opacity:1;}
.cmp-wrap:focus-within{
  background:rgba(212,175,55,.04);
  border-color:transparent;
  box-shadow:0 0 0 4px rgba(212,175,55,.08);
}

.cmp-wrap textarea{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--text);font-family:var(--ff-b);font-size:.93rem;font-weight:400;
  resize:none;line-height:1.56;max-height:130px;min-height:22px;
  padding:4px 0;scrollbar-width:thin;
}
.cmp-wrap textarea::placeholder{color:#424d66;}

/* send button */
.send{
  flex-shrink:0;border:none;border-radius:14px;
  width:46px;height:46px;
  background:linear-gradient(145deg,var(--gold-lt) 0%,var(--gold) 55%,var(--gold-dk) 100%);
  color:#14100a;cursor:pointer;
  transition:all .25s var(--ease-s);
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;
  box-shadow:0 4px 18px rgba(212,175,55,.28);
  position:relative;overflow:hidden;
}
.send::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(140deg,rgba(255,255,255,.25) 0%,transparent 60%);
}
.send svg{position:relative;z-index:1;transition:transform .22s var(--ease-s);}
.send:hover:not(:disabled) svg{transform:translateX(2px) translateY(-1px);}
.send:hover:not(:disabled){
  transform:translateY(-3px) scale(1.06);
  box-shadow:0 10px 32px rgba(212,175,55,.42);
}
.send:disabled{opacity:.32;cursor:not-allowed;transform:none;box-shadow:none;}

/* footer */
.cmp-foot{
  margin-top:10px;padding:0 5px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.foot-l{font-size:.71rem;color:var(--muted);display:flex;align-items:center;gap:6px;}
.foot-l kbd{
  font-size:.64rem;padding:1px 6px;border-radius:5px;
  border:1px solid var(--line);color:var(--muted);font-family:var(--ff-b);
}
.foot-r{display:flex;align-items:center;gap:10px;}

/* ai thinking indicator */
.ai-thinking{
  display:none;align-items:center;gap:7px;
  font-size:.71rem;color:var(--gold-dk);font-weight:500;
}
.ai-thinking.on{display:flex;animation:fadeIn .3s both;}
.spin{
  width:11px;height:11px;border-radius:50%;
  border:1.5px solid var(--gold-dk);border-top-color:var(--gold-lt);
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* char counter */
.chars{font-size:.7rem;color:var(--muted);transition:.2s;}
.chars.warn{color:var(--gold-dk);}

/* ═══════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════ */
@media(max-width:640px){
  body{padding:0;}
  .shell{max-width:none;border-radius:0;max-height:none;border-left:none;border-right:none;border-bottom:none;}
  .hdr{padding:14px 16px;}
  .pills{display:none;}
  .brand-name{font-size:1rem;}
  .msgs{padding:16px 14px 10px;}
  .msg{max-width:88%;}
  .bubble{padding:12px 15px;}
  .mtext{font-size:.88rem;}
  .composer{padding:12px 14px 16px;}
  .chip{padding:6px 12px;font-size:.74rem;}
}
@media(max-width:380px){
  .msg{max-width:94%;}
  .brand-sub{display:none;}
}
</style>
</head>
<body>

<!-- AMBIENT -->
<div class="bg-canvas">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="bg-grid"></div>
<div class="particles" id="particles"></div>

<!-- SHELL -->
<div class="shell">

  <!-- HEADER -->
  <header class="hdr">
    <div class="hdr-left">
      <div class="logo-wrap">
        <div class="logo">
          <div class="logo-sweep"></div>
          <span class="logo-symbol">✦</span>
        </div>
        <div class="presence"></div>
      </div>
      <div class="brand">
        <div class="brand-name">Zona VIP Trends</div>
        <div class="brand-sub">Asistente IA · Soporte profesional 24/7</div>
        <div class="pills">
          <span class="pill pill-live"><span class="pdot"></span>En línea ahora</span>
          <span class="pill pill-ai"><span class="pdot"></span>Powered by IA</span>
        </div>
      </div>
    </div>
    <div class="hdr-right">
      <button class="hbtn" id="resetBtn" title="Nueva conversación">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        Reiniciar
      </button>
    </div>
  </header>

  <!-- MESSAGES -->
  <main class="msgs" id="msgs" aria-live="polite" aria-label="Conversación de soporte Zona VIP Trends">
    <button class="sfab" id="sfab">↓ Nuevo mensaje</button>
  </main>

  <!-- COMPOSER -->
  <div class="composer">
    <div class="cmp-wrap">
      <textarea
        id="inp"
        rows="1"
        placeholder="Escribe tu pregunta… ej: ¿cómo funciona el mosaico viral?, ¿cuánto cuesta?, ¿cómo empiezo?"
        autocomplete="off"
        maxlength="1000"
        aria-label="Escribe tu mensaje"
      ></textarea>
      <button class="send" id="sendBtn" disabled aria-label="Enviar">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="cmp-foot">
      <span class="foot-l">
        <span style="width:5px;height:5px;border-radius:50%;background:var(--gold-dk);display:inline-block;"></span>
        Respuestas en tiempo real con IA · <kbd>Enter</kbd> para enviar · <kbd>Shift+Enter</kbd> para salto
      </span>
      <div class="foot-r">
        <div class="ai-thinking" id="aiThinking">
          <div class="spin"></div>Generando…
        </div>
        <span class="chars" id="chars">0/1000</span>
      </div>
    </div>
  </div>

</div>

<!-- ═══════════════ JAVASCRIPT ═══════════════ -->
<script>
"use strict";

/* ─── SYSTEM PROMPT ─────────────────────────────── */
const SYS = `Eres el asistente virtual oficial de Zona VIP Trends, una plataforma premium de publicidad digital, marketing gamificado y crecimiento viral para marcas y creadores de contenido. Representas la marca con profesionalidad, calidez y autoridad. Respondes siempre en español. Te diriges al usuario de "tú".

## Conocimiento completo de la plataforma

### ¿Qué es Zona VIP Trends?
Una agencia de publicidad digital que fusiona creatividad, tecnología avanzada y gamificación para que marcas y creadores conecten de forma efectiva. Su sistema estrella es el "Mosaico Viral", una cuadrícula interactiva donde cada participante ocupa un espacio y gana visibilidad real.

### El Mosaico Viral
- Cada participante reserva un espacio único dentro del mosaico.
- Los espacios son visibles para todos los visitantes de la plataforma.
- La actividad y participación aumentan el posicionamiento dentro del mosaico.
- Cada participante tiene un enlace personal compartible para amplificar su alcance.
- El efecto viral ocurre cuando varios participantes comparten simultáneamente.

### ¿Quién puede participar?
- Influencers y creadores de contenido de cualquier tamaño de audiencia.
- Marcas, empresas y startups que buscan exposición digital.
- Emprendedores, freelancers y profesionales independientes.
- Cualquier persona que quiera aumentar su presencia online.
- No se requiere tener muchos seguidores ni experiencia previa.

### Beneficios principales
- Visibilidad real y continua ante una audiencia activa y en crecimiento.
- Sistema gamificado de premios con recompensas transparentes y periódicas.
- Networking directo con otros creadores, influencers y marcas.
- Acceso a campañas activas de marcas que generan exposición extra.
- Enlace personal compartible para amplificar el alcance viralmente.
- Comunidad de socios con red social integrada dentro de la plataforma.
- Panel de control para monitorear visibilidad e interacciones.

### Sistema de premios
- Los premios se asignan de forma periódica, organizada y 100% transparente.
- Tipos de premios: económicos, en especie, servicios digitales y colaboraciones.
- Los participantes acumulan puntos según su actividad y participación.
- El proceso completo es verificable y auditable por los participantes.
- No hay sorteos ocultos: todo el sistema es justo y abierto.

### Campañas activas de marcas
- Las marcas lanzan campañas dentro de la plataforma que benefician a todos los participantes.
- Los participantes pueden asociarse a campañas relevantes para su nicho.
- Zona VIP Trends actúa como intermediario de confianza entre marcas y creadores.
- Las campañas generan oportunidades de exposición adicional y colaboraciones.

### Comunidad y red social interna
- La plataforma incluye una capa social para conectar participantes entre sí.
- Puedes seguir, interactuar y colaborar con otros socios VIP.
- La red interna amplifica el alcance orgánico de cada participante.
- El networking entre socios es uno de los mayores valores añadidos.

### Precios y planes
- Existen planes para todos los presupuestos: desde creadores individuales hasta grandes marcas.
- Los precios varían según el espacio elegido en el mosaico y el nivel de exposición.
- Planes disponibles: Básico, Premium y Enterprise.
- Los precios exactos son personalizados según las necesidades del cliente.
- Para consultar tarifas concretas, se recomienda contacto directo.

### Privacidad y seguridad
- Todos los datos se tratan conforme al RGPD europeo.
- Los datos personales nunca se ceden a terceros sin consentimiento explícito.
- Cada usuario controla completamente su perfil, visibilidad y privacidad.
- La plataforma utiliza cifrado de extremo a extremo y protocolos de seguridad actualizados.
- Los pagos se procesan a través de pasarelas certificadas y seguras.

### Diferencial competitivo
- Única plataforma que combina Mosaico Viral + Gamificación + Premios + Red Social.
- Tecnología propietaria desarrollada para maximizar el alcance viral.
- Sistema de premios transparente que genera confianza real.
- Comunidad activa con networking de valor entre creadores y marcas.
- No es solo visibilidad: es una experiencia participativa con retorno medible.

### Preguntas sobre el proceso de inicio
1. Elige tu espacio en el Mosaico Viral.
2. Personaliza tu perfil con tu información y redes.
3. Comparte tu enlace personal para comenzar a generar tráfico.
4. Participa activamente para acumular puntos y optar a premios.
5. Conecta con otros socios y marcas dentro de la comunidad.

## Instrucciones de respuesta

1. Sé conciso, directo y útil. Máximo 3-4 párrafos.
2. Usa **negrita** para resaltar conceptos clave importantes.
3. Si no tienes datos específicos (precio exacto, fecha), indica que deben contactar directamente.
4. Nunca inventes información que no tengas confirmada.
5. Responde ÚNICAMENTE con este JSON exacto, sin markdown exterior ni texto adicional:
{"answer":"respuesta completa con saltos de línea como \\n y **negrita** para conceptos clave","chips":[{"label":"texto del chip 1"},{"label":"texto del chip 2"},{"label":"texto del chip 3"}]}
6. Genera siempre entre 2 y 4 chips que sean preguntas relevantes y distintas entre sí.
7. Si la pregunta es completamente ajena a Zona VIP Trends, redirige con amabilidad.`;

/* ─── QUICK RESPONSES (sin API) ──────────────────── */
const QUICK = [
  {
    rx:/^(hola|buenas|hey|saludos|buenos\s?d[ií]as|buenas\s?tardes|buenas\s?noches|hi|hello|ola)\b/i,
    answer:"¡Hola! Bienvenido a **Zona VIP Trends** ✦\n\nSoy tu asistente IA y puedo responder cualquier pregunta sobre la plataforma en tiempo real: cómo funciona el **Mosaico Viral**, quién puede participar, el sistema de premios, precios, privacidad o cómo dar tus primeros pasos.\n\n¿Por dónde quieres empezar?",
    chips:["⚙️ ¿Cómo funciona el mosaico?","🚀 ¿Cómo empiezo?","🏆 Sistema de premios","💎 ¿Qué os hace diferentes?"]
  },
  {
    rx:/(gracias|muchas\s?gracias|thank\s?you|genial|perfecto|ok\s?gracias|excelente)/i,
    answer:"¡De nada! Ha sido un placer ayudarte 😊\n\n¿Tienes alguna otra duda sobre **Zona VIP Trends**? Estoy aquí para lo que necesites.",
    chips:["⚙️ ¿Cómo funciona?","📈 ¿Qué beneficios obtengo?","🤝 ¿Hay comunidad?","💰 ¿Cuánto cuesta?"]
  }
];

/* ─── STATE ───────────────────────────────────────── */
let busy = false;
let history = [];
const MAX_H = 16;

/* ─── ELEMENTS ────────────────────────────────────── */
const msgsEl    = document.getElementById("msgs");
const inp       = document.getElementById("inp");
const sendBtn   = document.getElementById("sendBtn");
const resetBtn  = document.getElementById("resetBtn");
const sfab      = document.getElementById("sfab");
const aiThink   = document.getElementById("aiThinking");
const charsEl   = document.getElementById("chars");

/* ─── PARTICLES ───────────────────────────────────── */
(function spawnParticles(){
  const c = document.getElementById("particles");
  for(let i=0;i<18;i++){
    const p = document.createElement("div");
    p.className = "par";
    const size = Math.random()*3+1;
    p.style.cssText = `
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;
      bottom:${Math.random()*30}%;
      opacity:0;
      animation-duration:${6+Math.random()*10}s;
      animation-delay:${Math.random()*8}s;
    `;
    c.appendChild(p);
  }
})();

/* ─── UTILS ───────────────────────────────────────── */
const sleep = ms => new Promise(r=>setTimeout(r,ms));
const now   = () => new Date().toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"});
const norm  = s => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^\w\s]/g," ").trim();

/* ─── SCROLL ──────────────────────────────────────── */
function scrollDown(smooth=true){
  msgsEl.scrollTo({top:msgsEl.scrollHeight,behavior:smooth?"smooth":"instant"});
}
msgsEl.addEventListener("scroll",()=>{
  const atBottom = msgsEl.scrollHeight-msgsEl.scrollTop-msgsEl.clientHeight<100;
  sfab.classList.toggle("show",!atBottom);
});
sfab.addEventListener("click",()=>scrollDown());

/* ─── TEXTAREA ────────────────────────────────────── */
inp.addEventListener("input",()=>{
  inp.style.height="auto";
  inp.style.height=Math.min(inp.scrollHeight,130)+"px";
  const l=inp.value.length;
  sendBtn.disabled=!inp.value.trim()||busy;
  charsEl.textContent=`${l}/1000`;
  charsEl.classList.toggle("warn",l>850);
});
inp.addEventListener("keydown",e=>{
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();if(!sendBtn.disabled)doSend();}
});
sendBtn.addEventListener("click",doSend);
resetBtn.addEventListener("click",resetChat);

/* ─── DATE DIVIDER ────────────────────────────────── */
function addDateDivider(){
  const d=document.createElement("div");
  d.className="date-row";
  const label=new Date().toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"long"});
  d.innerHTML=`<span>${label[0].toUpperCase()+label.slice(1)}</span>`;
  msgsEl.insertBefore(d,sfab);
}

/* ─── ADD MESSAGE ─────────────────────────────────── */
function addMsg({sender,title="",text="",chips=[],isTyping=false,isAi=false}){
  const wrap=document.createElement("div");
  wrap.className=`msg ${sender}`;
  if(isTyping) wrap.id="typing";

  const who=document.createElement("div");
  who.className="mwho";
  who.textContent=sender==="bot"?"Asistente Zona VIP":"Tú";

  const bbl=document.createElement("div");
  bbl.className="bubble";

  if(isTyping){
    bbl.classList.add("typing-bbl");
    bbl.innerHTML="<span class='tdot'></span><span class='tdot'></span><span class='tdot'></span>";
  }else{
    if(title){
      const t=document.createElement("div");
      t.className="mtitle";t.textContent=title;bbl.appendChild(t);
    }
    const p=document.createElement("div");
    p.className="mtext";
    p.innerHTML=text
      .replace(/\*\*(.+?)\*\*/g,"<b>$1</b>")
      .replace(/\n/g,"<br>");
    bbl.appendChild(p);

    if(isAi){
      const badge=document.createElement("div");
      badge.className="ai-badge";
      badge.innerHTML="<span class='ai-dot'></span>Generado por IA";
      bbl.appendChild(badge);
    }

    if(chips.length){
      const cw=document.createElement("div");
      cw.className="chips";
      chips.forEach(c=>{
        const label=typeof c==="string"?c:(c.label||c);
        const btn=document.createElement("button");
        btn.className="chip";btn.textContent=label;
        btn.addEventListener("click",()=>{
          inp.value=label;inp.style.height="auto";
          sendBtn.disabled=false;doSend();
        });
        cw.appendChild(btn);
      });
      bbl.appendChild(cw);
    }
  }

  const ts=document.createElement("div");
  ts.className="mts";
  ts.textContent=sender==="bot"?`Asistente · ${now()}`:`Tú · ${now()}`;

  wrap.appendChild(who);wrap.appendChild(bbl);wrap.appendChild(ts);
  msgsEl.insertBefore(wrap,sfab);
  scrollDown();
  return wrap;
}

/* ─── TYPING INDICATOR ────────────────────────────── */
function showTyping(){removeTyping();addMsg({sender:"bot",isTyping:true});}
function removeTyping(){const e=document.getElementById("typing");if(e)e.remove();}

/* ─── AI CALL ─────────────────────────────────────── */
async function callAI(userMsg){
  history.push({role:"user",content:userMsg});
  const slice=history.slice(-MAX_H);

  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:1000,
      system:SYS,
      messages:slice
    })
  });
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  const data=await res.json();
  const raw=data.content.map(b=>b.type==="text"?b.text:"").join("").trim();
  history.push({role:"assistant",content:raw});

  try{
    const clean=raw.replace(/^```json\s*/,"").replace(/\s*```$/,"").trim();
    return JSON.parse(clean);
  }catch{
    return {answer:raw,chips:[]};
  }
}

/* ─── MAIN SEND ───────────────────────────────────── */
async function doSend(){
  const text=inp.value.trim();
  if(!text||busy)return;

  addMsg({sender:"user",text});
  inp.value="";inp.style.height="auto";
  sendBtn.disabled=true;charsEl.textContent="0/1000";

  // Quick match
  for(const q of QUICK){
    if(q.rx.test(norm(text))){
      showTyping();
      await sleep(440);
      removeTyping();
      addMsg({sender:"bot",text:q.answer,chips:q.chips||[]});
      return;
    }
  }

  // AI
  busy=true;
  aiThink.classList.add("on");
  showTyping();

  try{
    const result=await callAI(text);
    removeTyping();
    addMsg({
      sender:"bot",
      text:result.answer||"No he podido generar una respuesta. Inténtalo de nuevo.",
      chips:(result.chips||[]).map(c=>typeof c==="string"?c:(c.label||c)),
      isAi:true
    });
  }catch(err){
    removeTyping();
    history.pop();
    addMsg({
      sender:"bot",
      title:"⚠️ Error de conexión",
      text:"No he podido conectar con el servicio de IA. Comprueba tu conexión e inténtalo de nuevo, o reinicia el chat.",
      chips:["🔄 Intentar de nuevo","⚙️ ¿Cómo funciona?","🚀 ¿Cómo empiezo?"]
    });
  }finally{
    busy=false;
    aiThink.classList.remove("on");
    sendBtn.disabled=!inp.value.trim();
  }
}

/* ─── RESET ───────────────────────────────────────── */
function resetChat(){
  history=[];
  [...msgsEl.children].forEach(c=>{if(c.id!=="sfab")c.remove();});
  init();
}

/* ─── INIT ────────────────────────────────────────── */
async function init(){
  addDateDivider();
  await sleep(280);
  showTyping();
  await sleep(700);
  removeTyping();

  addMsg({
    sender:"bot",
    title:"✦ Bienvenido a Zona VIP Trends",
    text:"Hola, soy tu asistente con **inteligencia artificial** y puedo responder cualquier pregunta sobre la plataforma de forma precisa y en tiempo real.\n\nDesde cómo funciona el **Mosaico Viral** hasta precios, premios, privacidad o primeros pasos. ¿Qué quieres saber?",
    chips:["⚙️ ¿Cómo funciona el mosaico?","🚀 ¿Cómo empiezo?","🙋 ¿Quién puede participar?","🏆 Sistema de premios"]
  });

  await sleep(1000);
  addMsg({
    sender:"bot",
    text:"También puedo ayudarte con **precios y planes**, **privacidad de datos**, cómo sacar partido a las **campañas de marcas** o cómo crecer dentro de la comunidad de socios. Pregunta lo que necesites 👇",
    chips:["💰 ¿Cuánto cuesta?","🔒 ¿Cómo protegéis mis datos?","🤝 ¿Hay comunidad entre socios?","💎 ¿Qué os hace únicos?"]
  });

  inp.focus();
}

window.addEventListener("DOMContentLoaded",init);
</script>
