<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zona VIP Trends - Soporte</title>
<style>
    /* Reset básico */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { height: 100%; font-family: 'Arial', sans-serif; }body { background-color: #121212; color: #fff; display: flex; justify-content: center; align-items: center; }

/* Contenedor principal */
.chat-container { width: 100%; max-width: 450px; height: 80vh; background-color: #1e1e1e; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.5); }

/* Header */
.chat-header { background-color: #000; padding: 15px; text-align: center; font-size: 1.2em; font-weight: bold; color: #FFD700; }

/* Area de mensajes */
.chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
.message { padding: 10px 15px; border-radius: 12px; max-width: 80%; position: relative; }
.bot-message { background-color: #333; align-self: flex-start; }
.user-message { background-color: #FFD700; color: #000; align-self: flex-end; }

/* Avatar */
.bot-message::before { content: '\1F916'; position: absolute; left: -30px; top: 10px; font-size: 1.4em; }

/* Input */
.chat-input { display: flex; border-top: 1px solid #444; }
.chat-input input { flex: 1; padding: 12px 15px; border: none; outline: none; background: #2c2c2c; color: #fff; }
.chat-input button { background-color: #FFD700; color: #000; border: none; padding: 12px 20px; cursor: pointer; font-weight: bold; }

/* Botones de opciones */
.option-buttons { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 5px; }
.option-buttons button { background-color: #FFD700; color: #000; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 0.9em; }

/* Scroll automático suave */
.chat-messages::-webkit-scrollbar { width: 6px; }
.chat-messages::-webkit-scrollbar-thumb { background-color: #555; border-radius: 3px; }

</style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">Zona VIP Trends Bot</div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Escribe aquí..." />
        <button id="sendBtn">Enviar</button>
    </div>
</div><script>
const chatMessages = document.getElementById('chatMessages');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');

// Respuestas predeterminadas
const botResponses = {
    inicio: {
        text: '¡Hola! Bienvenido a Zona VIP Trends. Soy tu asistente virtual y puedo guiarte para entender nuestra plataforma y oportunidades.',
        options: ['¿Quiénes somos?', '¿Qué ofrecemos?', 'Cómo participar']
    },
    '¿Quiénes somos?': {
        text: 'Somos una agencia de publicidad digital que combina creatividad, tecnología y gamificación, ofreciendo un modelo innovador para que marcas y creadores conecten de forma efectiva.',
        options: ['¿Qué ofrecemos?', 'Cómo participar']
    },
    '¿Qué ofrecemos?': {
        text: 'Brindamos a marcas y creadores visibilidad, exposición y conexión dentro de una plataforma viral, incorporando premios y un sistema social que fomenta la participación y engagement.',
        options: ['Cómo participar', 'Premios']
    },
    'Cómo participar': {
        text: 'Es muy sencillo: solo selecciona tu espacio en la plataforma, sube tu imagen y link, y empieza a formar parte del mosaico viral. Desde allí, podrás compartir y participar en premios y campañas activas.',
        options: ['Premios', 'Sistema social']
    },
    'Premios': {
        text: 'Hay aproximadamente 200-300 espacios premiados con un total de 150.000€. Para marcas: campañas pagadas a influencers que generan promoción real. Para influencers/usuarios: campañas ya cerradas garantizando exposición destacada.',
        options: ['Sistema social', 'Beneficios para creadores']
    },
    'Sistema social': {
        text: 'Cada participante se integra en la comunidad de Zona VIP Trends. Al entrar, tu espacio queda activo y vinculado a tu perfil. Los premios se asignan en redes de 3 niveles, asegurando reparto justo dentro de tu red social.',
        options: ['Beneficios para creadores', 'Seguridad']
    },
    'Beneficios para creadores': {
        text: 'Ganas visibilidad dentro del mosaico global, acceso a un asesor digital, posibilidad de participar en premios y un sistema social que potencia tu alcance y engagement.',
        options: ['Seguridad']
    },
    'Seguridad': {
        text: 'Sí. Cada espacio es garantizado y para siempre, los premios se gestionan de manera transparente, con campañas de marcas que ya están activas y colaborando.',
        options: ['Inicio']
    }
};

// Función para mostrar mensajes
function addMessage(text, sender='bot') {
    const div = document.createElement('div');
    div.classList.add('message', sender === 'bot' ? 'bot-message' : 'user-message');
    div.innerText = text;
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

// Función para mostrar botones de opciones
function showOptions(options) {
    const container = document.createElement('div');
    container.classList.add('option-buttons');
    options.forEach(opt => {
        const btn = document.createElement('button');
        btn.innerText = opt;
        btn.addEventListener('click', () => handleUserInput(opt));
        container.appendChild(btn);
    });
    chatMessages.appendChild(container);
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

// Manejar entrada de usuario
function handleUserInput(input) {
    addMessage(input, 'user');
    const response = botResponses[input] || { text: 'Lo siento, no entendí eso. Por favor selecciona una opción.', options: ['Inicio'] };
    setTimeout(() => {
        addMessage(response.text);
        if(response.options) showOptions(response.options);
    }, 500);
}

// Enviar al presionar botón o Enter
sendBtn.addEventListener('click', () => {
    const text = userInput.value.trim();
    if(text) {
        handleUserInput(text);
        userInput.value = '';
    }
});
userInput.addEventListener('keypress', e => {
    if(e.key === 'Enter') sendBtn.click();
});

// Inicio del chat
addMessage(botResponses['inicio'].text);
showOptions(botResponses['inicio'].options);
</script></body>
</html>
