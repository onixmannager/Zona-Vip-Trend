<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zona VIP Trends - Chat de Soporte</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #111;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  #chat-container {
    width: 400px;
    max-width: 90%;
    height: 600px;
    border: 2px solid #d4af37;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    background-color: #222;
  }

  #chat-header {
    padding: 15px;
    background-color: #333;
    text-align: center;
    font-weight: bold;
    color: #d4af37;
  }

  #chat-body {
    flex: 1;
    padding: 15px;
    background-color: #fff;
    color: #111;
    overflow-y: auto;
    font-size: 14px;
  }

  .message {
    margin-bottom: 12px;
    padding: 8px 12px;
    border-radius: 8px;
    max-width: 80%;
  }

  .bot {
    background-color: #f1f1f1;
    color: #111;
    align-self: flex-start;
  }

  .user {
    background-color: #d4af37;
    color: #111;
    align-self: flex-end;
  }

  #chat-input-container {
    display: flex;
    border-top: 2px solid #d4af37;
  }

  #chat-input {
    flex: 1;
    padding: 10px;
    border: none;
    outline: none;
    font-size: 14px;
  }

  #send-btn {
    background-color: #d4af37;
    border: none;
    padding: 10px 15px;
    cursor: pointer;
    font-weight: bold;
    color: #111;
  }

  #send-btn:hover {
    background-color: #b8972d;
  }
</style>
</head>
<body>

<div id="chat-container">
  <div id="chat-header">ZonaVipTrendsBot</div>
  <div id="chat-body">
    <div class="message bot">¡Hola! Soy ZonaVipTrendsBot, tu asistente de soporte. Puedes preguntarme sobre cómo funciona nuestra plataforma, premios, participación y más.</div>
  </div>
  <div id="chat-input-container">
    <input type="text" id="chat-input" placeholder="Escribe tu mensaje...">
    <button id="send-btn">Enviar</button>
  </div>
</div>

<script>
  const chatBody = document.getElementById('chat-body');
  const chatInput = document.getElementById('chat-input');
  const sendBtn = document.getElementById('send-btn');

  // Mensajes automáticos predefinidos
  const responses = {
    "quien somos": "Somos una agencia de publicidad digital que combina creatividad, tecnología y gamificación, ofreciendo un modelo innovador.",
    "que ofrecemos": "Ofrecemos visibilidad, conexión y participación en premios y campañas activas dentro de nuestra plataforma viral.",
    "como funciona": "Cada usuario tiene un espacio en el mosaico, vinculado a su perfil. Participa en premios, comparte tu link y aumenta tu exposición.",
    "premios": "Los premios se distribuyen en tu red social en 3 niveles, incentivando la viralización y participación activa.",
    "como participar": "Selecciona tu espacio en la plataforma, comparte tu link y empieza a formar parte del mosaico viral.",
    "seguro": "Sí. Cada espacio es garantizado para siempre y los premios se gestionan de forma transparente con marcas activas.",
    "default": "Disculpa, no entiendo tu pregunta. Puedes escribir 'quien somos', 'que ofrecemos', 'como funciona', 'premios', 'como participar' o 'seguro'."
  };

  function addMessage(text, type) {
    const msg = document.createElement('div');
    msg.classList.add('message', type);
    msg.textContent = text;
    chatBody.appendChild(msg);
    chatBody.scrollTop = chatBody.scrollHeight;
  }

  function botResponse(userMsg) {
    const msg = userMsg.toLowerCase();
    const response = responses[msg] || responses["default"];
    addMessage(response, 'bot');
  }

  sendBtn.addEventListener('click', () => {
    const userMsg = chatInput.value.trim();
    if(userMsg === '') return;
    addMessage(userMsg, 'user');
    botResponse(userMsg);
    chatInput.value = '';
  });

  chatInput.addEventListener('keypress', (e) => {
    if(e.key === 'Enter') sendBtn.click();
  });
</script>

</body>
</html>
