<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>ZonaVip Trends · Comunidad VIP</title>

  <!-- Fuentes -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Barlow+Condensed:wght@300;400;500;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { getFirestore, collection, query, orderBy, limit, onSnapshot, addDoc, serverTimestamp, where, getDocs, updateDoc, doc, arrayUnion, arrayRemove, increment } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    // ═══════════════════════════════════════════════════════════
    // CONFIGURACIÓN DE FIREBASE (reemplaza con tus datos)
    // ═══════════════════════════════════════════════════════════
    const firebaseConfig = {
      apiKey: "TU_API_KEY",
      authDomain: "TU_PROYECTO.firebaseapp.com",
      projectId: "TU_PROYECTO",
      storageBucket: "TU_PROYECTO.appspot.com",
      messagingSenderId: "TU_SENDER_ID",
      appId: "TU_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window._fbAuth = auth;
    window._fbDb = db;
    window._fbOnAuth = (cb) => onAuthStateChanged(auth, cb);
    
    // ── Posts ─────────────────────────────────────────────────
    window._fbAddPost = async (postData) => {
      const postsRef = collection(db, 'posts');
      return addDoc(postsRef, {
        ...postData,
        createdAt: serverTimestamp(),
        likes: [],
        likeCount: 0
      });
    };

    window._fbGetPosts = (callback) => {
      const postsRef = collection(db, 'posts');
      const q = query(postsRef, orderBy('createdAt', 'desc'), limit(100));
      return onSnapshot(q, (snapshot) => {
        const posts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        callback(posts);
      });
    };

    window._fbCheckUserCanPost = async (email) => {
      const postsRef = collection(db, 'posts');
      const oneDayAgo = new Date(Date.now() - 24 * 60 * 60 * 1000);
      const q = query(postsRef, where('email', '==', email), where('createdAt', '>=', oneDayAgo));
      const snapshot = await getDocs(q);
      return snapshot.empty;
    };

    window._fbCheckVip = async (email) => {
      const zonesRef = collection(db, 'zones');
      const q = query(zonesRef, where('email', '==', email));
      const snapshot = await getDocs(q);
      return !snapshot.empty;
    };

    // ── Reacciones (likes) ───────────────────────────────────
    window._fbToggleLike = async (postId, userEmail) => {
      const postRef = doc(db, 'posts', postId);
      const postSnap = await getDocs(query(collection(db, 'posts'), where('__name__', '==', postId)));
      if (postSnap.empty) return;
      const postData = postSnap.docs[0].data();
      const likes = postData.likes || [];
      const hasLiked = likes.includes(userEmail);
      
      if (hasLiked) {
        await updateDoc(postRef, {
          likes: arrayRemove(userEmail),
          likeCount: increment(-1)
        });
      } else {
        await updateDoc(postRef, {
          likes: arrayUnion(userEmail),
          likeCount: increment(1)
        });
      }
      return !hasLiked; // devuelve true si ahora tiene like
    };
  </script>

  <style>
    /* ===== ESTILOS UNIFICADOS ===== */
    :root {
      --gold:        #BF9B5A;
      --gold-light:  #D4B578;

      color: var(--cream);

    @media (max-width: 600px) { #barra { padding: 0 16px; } }

    .barra-logo {

    }

      text-transform: uppercase; color: var(--cream);
    }
    .barra-logo-vip { color: var(--gold); }
    .barra-logo-tag {
      font-family: var(--fc); font-size: 0.62rem; letter-spacing: 0.28em;
      text-transform: uppercase; color: var(--cream-muted); opacity: 0.7;

    #nav-menu-wrap { margin-left: auto; display: flex; align-items: center; gap: 5px; }
    #btn-menu {

    #btn-menu.open { color: var(--gold); border-color: var(--gold-dim); background: rgba(191,155,90,0.06); }

    #nav-dropdown {

    #nav-dropdown.open { opacity: 1; pointer-events: all; transform: translateY(0) scale(1); }
    .nav-header {
      padding: 13px 18px 9px; font-family: var(--fc); font-size: .6rem;
      letter-spacing: .32em; text-transform: uppercase; color: var(--gold);

    .nav-item {

    .nav-item:hover { background: rgba(191,155,90,0.04); color: var(--cream); padding-left: 22px; }

    /* Main layout */

      background: var(--card); border: 1px solid var(--border);

      animation: fadeIn .3s ease;

    .msg-header {

    .msg-avatar {

    .empty-chat {

    /* Formulario */
    .chat-form {

    .chat-textarea {

    .chat-textarea:focus { border-color: var(--gold); }
    .chat-textarea::placeholder { color: var(--muted); }

    .form-row {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .attach-label {
      display: flex; align-items: center; gap: 6px; padding: 7px 12px;
      background: transparent; border: 1px solid var(--border);
      border-radius: 2px; color: var(--muted2);
      font-family: var(--fc); font-size: .6rem; text-transform: uppercase;
      cursor: pointer; transition: all .15s;

    .attach-label:hover { border-color: var(--gold); color: var(--gold); }

    .send-btn {
      padding: 7px 18px; background: transparent;

      color: var(--gold); font-family: var(--fc); font-size: .65rem;

    .send-btn:hover:not(:disabled) {

    .send-btn:disabled { opacity: .4; cursor: not-allowed; }

    .limit-info {

    }

    .preview-area {

    /* Login / No VIP */

    /* Toast */

  </style>

<script type="module">
  // ═══════════════════════════════════════════════════════════
  //  LÓGICA PRINCIPAL (usando imports ya cargados)
  // ═══════════════════════════════════════════════════════════
  import { getAuth, signInWithEmailAndPassword, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  
  const auth = getAuth();
  
  // Variables globales
  let currentUser = null;
  let isVip = false;
  let canPost = false;
  let selectedFile = null;
  let unsubscribeMessages = null;

  const chatMessages = document.getElementById('chat-messages');
  const formContainer = document.getElementById('form-container');
  const toast = document.getElementById('toast');

  function showToast(msg, type = '') {
    toast.textContent = msg;
    toast.className = 'show ' + type;
    setTimeout(() => toast.className = '', 3000);
  }

  function formatTime(timestamp) {
    if (!timestamp) return '';
    const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
    const now = new Date();
    const diff = now - date;
    const mins = Math.floor(diff / 60000);
    const hours = Math.floor(diff / 3600000);
    if (mins < 1) return 'ahora';
    if (mins < 60) return `hace ${mins} min`;
    if (hours < 24) return `hace ${hours} h`;
    return `hace ${Math.floor(hours / 24)} d`;
  }

  function escapeHtml(text) {
    return String(text).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]);
  }

  // Subir imagen a Cloudinary vía backend Vercel
  async function uploadImage(file) {
    // ⚠️ REEMPLAZAR con tu endpoint real de Vercel
    const formData = new FormData();
    formData.append('image', file);
    
    // Simulación para pruebas (eliminar en producción)
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => resolve(e.target.result);
      reader.readAsDataURL(file);
    });
    
    /* CÓDIGO REAL (descomentar cuando tengas el backend)
    const response = await fetch('/api/upload', {
      method: 'POST',
      body: formData
    });
    const data = await response.json();
    if (!data.url) throw new Error('Error al subir imagen');
    return data.url;
    */
  }

  // Renderizar mensajes
  function renderMessages(posts) {
    if (!posts || posts.length === 0) {
      chatMessages.innerHTML = '<div class="empty-chat"><i class="fas fa-comment-alt"></i> No hay publicaciones aún. ¡Sé el primero!</div>';
      return;
    }
    // Ordenar por fecha ascendente para que el más reciente quede abajo (invertimos el array)
    const sorted = [...posts].sort((a, b) => {
      const timeA = a.createdAt?.toDate?.() || new Date(a.createdAt);
      const timeB = b.createdAt?.toDate?.() || new Date(b.createdAt);
      return timeA - timeB;
    });
    
    chatMessages.innerHTML = sorted.map(post => {
      const userName = post.userName || post.email?.split('@')[0] || 'VIP';
      const avatarLetter = userName.charAt(0).toUpperCase();
      const time = post.createdAt ? formatTime(post.createdAt) : '';
      const content = post.content || '';
      const imageUrl = post.imageUrl || '';
      const likeCount = post.likeCount || 0;
      const userHasLiked = currentUser && post.likes?.includes(currentUser.email);

      return `
        <div class="message-card" data-post-id="${post.id}">
          <div class="msg-header">
            <div class="msg-avatar">${avatarLetter}</div>
            <span class="msg-author">@${escapeHtml(userName)}</span>
            <span class="msg-time">${time}</span>
          </div>
          <div class="msg-content">${escapeHtml(content)}</div>
          ${imageUrl ? `<div class="msg-image"><img src="${escapeHtml(imageUrl)}" alt="Imagen"></div>` : ''}
          <div class="msg-actions">
            <button class="like-btn ${userHasLiked ? 'liked' : ''}" onclick="handleLike('${post.id}')" ${!currentUser ? 'disabled' : ''}>
              <i class="${userHasLiked ? 'fas' : 'far'} fa-heart"></i>
              <span class="like-count">${likeCount}</span>
            </button>
          </div>
        </div>
      `;
    }).join('');
  }

  // Manejar like
  window.handleLike = async function(postId) {
    if (!currentUser) {
      showToast('Inicia sesión para reaccionar', 'err');
      return;
    }
    try {
      const liked = await window._fbToggleLike(postId, currentUser.email);
      // No es necesario recargar, Firestore actualizará automáticamente vía onSnapshot
    } catch (e) {
      showToast('Error al reaccionar', 'err');
    }
  };

  // Verificar límite diario
  async function checkCanPost(email) {
    try {
      const can = await window._fbCheckUserCanPost(email);
      canPost = can;
      return can;
    } catch (e) {
      return false;
    }
  }

  // Verificar VIP
  async function checkVip(email) {
    try {
      return await window._fbCheckVip(email);
    } catch (e) {
      return false;
    }
  }

  // Renderizar formulario según estado
  async function renderForm() {
    if (!currentUser) {
      formContainer.innerHTML = `
        <div class="info-panel">
          <i class="fas fa-lock" style="font-size:1.8rem; color:var(--gold); margin-bottom:12px;"></i>
          <div style="font-family:var(--fh); font-size:1.2rem;">Acceso VIP requerido</div>
          <div style="font-family:var(--fc); color:var(--muted2);">Inicia sesión desde el menú para participar.</div>
        </div>
      `;
      return;
    }

    isVip = await checkVip(currentUser.email);
    if (!isVip) {
      formContainer.innerHTML = `
        <div class="info-panel">
          <i class="fas fa-crown" style="font-size:1.8rem; color:var(--gold);"></i>
          <div style="font-family:var(--fh); font-size:1.2rem;">Solo para VIPs</div>
          <div style="font-family:var(--fc); color:var(--muted2);">Compra una zona en el mosaico para desbloquear la comunidad.</div>
          <a href="index.html" style="display:inline-block; margin-top:16px; padding:8px 20px; border:1px solid var(--gold-dim); color:var(--gold); text-decoration:none;">Comprar zona</a>
        </div>
      `;
      return;
    }

    await checkCanPost(currentUser.email);
    const limitText = canPost ? 'Puedes publicar ahora (1 por día)' : 'Ya publicaste hoy. Vuelve mañana.';
    const disabled = !canPost;

    formContainer.innerHTML = `
      <div class="chat-form">
        <textarea class="chat-textarea" id="message-input" placeholder="¿Qué quieres compartir?" ${disabled ? 'disabled' : ''}></textarea>
        <div class="form-row">
          <label class="attach-label" for="image-upload" ${disabled ? 'style="opacity:0.5;pointer-events:none;"' : ''}>
            <i class="fas fa-image"></i> Añadir imagen
          </label>
          <input type="file" id="image-upload" accept="image/*" style="display:none;" ${disabled ? 'disabled' : ''}>
          <button class="send-btn" id="send-btn" onclick="publishPost()" ${disabled ? 'disabled' : ''}>
            <i class="fas fa-paper-plane"></i> Publicar
          </button>
        </div>
        <div id="image-preview-container" style="margin-top:8px;"></div>
        <div class="limit-info">${limitText}</div>
      </div>
    `;

    // Configurar listener de archivo
    const fileInput = document.getElementById('image-upload');
    const previewContainer = document.getElementById('image-preview-container');
    
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      if (file.size > 5 * 1024 * 1024) {
        showToast('Imagen demasiado grande (máx 5MB)', 'err');
        return;
      }
      selectedFile = file;
      
      const reader = new FileReader();
      reader.onload = (ev) => {
        previewContainer.innerHTML = `
          <div style="display:flex; align-items:center; gap:8px;">
            <img src="${ev.target.result}" class="preview-image">
            <span class="remove-preview" onclick="removeImage()"><i class="fas fa-times"></i> Quitar</span>
          </div>
        `;
      };
      reader.readAsDataURL(file);
    });
  }

  window.removeImage = function() {
    selectedFile = null;
    document.getElementById('image-upload').value = '';
    document.getElementById('image-preview-container').innerHTML = '';
  };

  // Publicar post
  window.publishPost = async function() {
    const input = document.getElementById('message-input');
    const content = input.value.trim();
    
    if (!content && !selectedFile) {
      showToast('Escribe algo o añade una imagen', 'err');
      return;
    }

    const btn = document.getElementById('send-btn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

    try {
      let imageUrl = null;
      if (selectedFile) {
        showToast('Subiendo imagen...', '');
        imageUrl = await uploadImage(selectedFile);
      }

      await window._fbAddPost({
        email: currentUser.email,
        userName: currentUser.email.split('@')[0],
        content: content,
        imageUrl: imageUrl
      });

      input.value = '';
      removeImage();
      showToast('¡Publicado!', 'ok');
      
      // Actualizar límite
      await checkCanPost(currentUser.email);
      renderForm();
    } catch (e) {
      console.error(e);
      showToast('Error al publicar', 'err');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-paper-plane"></i> Publicar';
    }
  };

  // Login desde modal
  window.loginVip = async function() {
    const email = document.getElementById('vip-email').value;
    const pass = document.getElementById('vip-password').value;
    try {
      await signInWithEmailAndPassword(auth, email, pass);
      document.getElementById('modal-vip').style.display = 'none';
      showToast('Sesión iniciada', 'ok');
    } catch (e) {
      alert('Error: ' + e.message);
    }
  };

  // Menú
  window.toggleMenu = function() {
    const btn = document.getElementById('btn-menu');
    const dd = document.getElementById('nav-dropdown');
    const ov = document.getElementById('nav-overlay');
    const isOpen = dd.classList.contains('open');
    if (isOpen) {
      btn.classList.remove('open');
      dd.classList.remove('open');
      ov.classList.remove('open');
    } else {
      btn.classList.add('open');
      dd.classList.add('open');
      ov.classList.add('open');
    }
  };
  window.cerrarMenu = function() {
    document.getElementById('btn-menu').classList.remove('open');
    document.getElementById('nav-dropdown').classList.remove('open');
    document.getElementById('nav-overlay').classList.remove('open');
  };

  // Observador de autenticación
  window._fbOnAuth(async (user) => {
    currentUser = user;
    await renderForm();
    
    if (unsubscribeMessages) unsubscribeMessages();
    unsubscribeMessages = window._fbGetPosts((posts) => {
      renderMessages(posts);
    });
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      cerrarMenu();
      document.getElementById('modal-vip').style.display = 'none';
    }
  });

  // Exponer funciones globales necesarias
  window.showToast = showToast;
</script>
</body>
</html>
