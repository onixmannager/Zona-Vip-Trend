<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COURSE TEMPLATE — Editable</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   COURSE TEMPLATE — Dark Gold Edition
   HOW TO CUSTOMIZE:
   1. Edit the COURSE_DATA object at the bottom of this file
   2. Change COURSE_CONFIG for title, subtitle, author
   3. Replace module/lesson/question content
   ============================================================ */

:root {
  --bg: #0a0a0a;
  --bg2: #111111;
  --bg3: #161616;
  --gold: #c9a84c;
  --gold-light: #e8c97e;
  --gold-dim: #7a6430;
  --gold-glow: rgba(201,168,76,0.15);
  --text: #f0ead6;
  --text-dim: #8a7d65;
  --border: rgba(201,168,76,0.2);
  --border-bright: rgba(201,168,76,0.5);
  --correct: #4caf7d;
  --wrong: #e05c5c;
  --radius: 4px;
  --font-display: 'Cormorant Garamond', serif;
  --font-body: 'Montserrat', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── GRAIN OVERLAY ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 9999; opacity: 0.4;
}

/* ── LAYOUT ── */
#app { display: flex; min-height: 100vh; }

/* ── SIDEBAR ── */
#sidebar {
  width: 280px; min-height: 100vh;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: fixed; left: 0; top: 0; bottom: 0;
  z-index: 100;
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
}

#sidebar-logo {
  padding: 32px 24px 20px;
  border-bottom: 1px solid var(--border);
}
#sidebar-logo .course-tag {
  font-family: var(--font-body);
  font-size: 9px; letter-spacing: 4px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 8px;
}
#sidebar-logo .course-title {
  font-family: var(--font-display);
  font-size: 22px; font-weight: 600;
  color: var(--text); line-height: 1.2;
}

#sidebar-progress-bar {
  margin: 16px 24px;
  height: 2px; background: var(--bg3);
  border-radius: 2px; overflow: hidden;
}
#sidebar-progress-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold-light));
  transition: width 0.6s ease;
}
#sidebar-progress-text {
  padding: 0 24px 8px;
  font-size: 10px; letter-spacing: 2px; color: var(--text-dim);
  text-transform: uppercase;
}

#sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 0; }
#sidebar-nav::-webkit-scrollbar { width: 3px; }
#sidebar-nav::-webkit-scrollbar-track { background: transparent; }
#sidebar-nav::-webkit-scrollbar-thumb { background: var(--gold-dim); }

.nav-module { margin-bottom: 4px; }
.nav-module-title {
  padding: 10px 24px;
  font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold-dim); font-weight: 600;
}
.nav-lesson {
  padding: 9px 24px 9px 36px;
  font-size: 11px; letter-spacing: 0.5px;
  color: var(--text-dim);
  cursor: pointer;
  display: flex; align-items: center; gap: 10px;
  transition: all 0.2s;
  border-left: 2px solid transparent;
  margin-left: 0;
}
.nav-lesson:hover { color: var(--text); background: var(--gold-glow); }
.nav-lesson.active {
  color: var(--gold-light);
  border-left-color: var(--gold);
  background: var(--gold-glow);
}
.nav-lesson.completed .nav-dot { background: var(--gold); }
.nav-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--bg3); border: 1px solid var(--gold-dim);
  flex-shrink: 0; transition: background 0.3s;
}
.nav-quiz-item {
  padding: 9px 24px 9px 36px;
  font-size: 11px; letter-spacing: 0.5px;
  color: var(--gold-dim);
  cursor: pointer;
  display: flex; align-items: center; gap: 10px;
  transition: all 0.2s;
  border-left: 2px solid transparent;
}
.nav-quiz-item:hover { color: var(--gold); background: var(--gold-glow); }
.nav-quiz-item.active { color: var(--gold); border-left-color: var(--gold); background: var(--gold-glow); }

/* ── MAIN CONTENT ── */
#main {
  margin-left: 280px;
  flex: 1; display: flex; flex-direction: column;
  min-height: 100vh;
}

/* ── TOP BAR ── */
#topbar {
  height: 60px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 40px;
  gap: 16px;
  position: sticky; top: 0; z-index: 50;
}
#menu-toggle {
  display: none;
  background: none; border: none; color: var(--gold);
  font-size: 20px; cursor: pointer; padding: 4px;
}
#breadcrumb {
  flex: 1;
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--text-dim);
}
#breadcrumb span { color: var(--gold); }
#score-badge {
  font-size: 11px; letter-spacing: 2px;
  color: var(--gold);
  border: 1px solid var(--border);
  padding: 4px 12px; border-radius: 20px;
}

/* ── SLIDE AREA ── */
#slide-area {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding: 60px 40px;
  min-height: calc(100vh - 60px);
}

/* ── LESSON SLIDE ── */
.lesson-slide {
  max-width: 780px; width: 100%;
  animation: fadeUp 0.5s ease both;
}
@keyframes fadeUp {
  from { opacity:0; transform: translateY(24px); }
  to   { opacity:1; transform: translateY(0); }
}

.slide-eyebrow {
  font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 16px;
  display: flex; align-items: center; gap: 12px;
}
.slide-eyebrow::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--border), transparent);
}

.slide-headline {
  font-family: var(--font-display);
  font-size: clamp(32px, 5vw, 56px);
  font-weight: 600; line-height: 1.1;
  color: var(--text); margin-bottom: 32px;
}
.slide-headline em {
  font-style: italic; color: var(--gold-light);
}

.slide-body {
  font-size: 15px; line-height: 1.8;
  color: #b8ad96; margin-bottom: 32px;
}

.slide-keypoints {
  list-style: none;
  display: flex; flex-direction: column; gap: 12px;
  margin-bottom: 36px;
}
.slide-keypoints li {
  display: flex; align-items: flex-start; gap: 14px;
  font-size: 14px; line-height: 1.6; color: var(--text-dim);
  padding: 14px 18px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: border-color 0.2s, color 0.2s;
}
.slide-keypoints li:hover { border-color: var(--border-bright); color: var(--text); }
.slide-keypoints li::before {
  content: '◆';
  color: var(--gold); font-size: 8px; margin-top: 4px; flex-shrink: 0;
}

.slide-image-placeholder {
  width: 100%; aspect-ratio: 16/7;
  background: var(--bg2);
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 32px;
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold-dim);
}

/* Slide counter dots */
.slide-dots {
  display: flex; gap: 8px; justify-content: center;
  margin-bottom: 40px;
}
.slide-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--bg3); border: 1px solid var(--gold-dim);
  cursor: pointer; transition: all 0.2s;
}
.slide-dot.active { background: var(--gold); border-color: var(--gold); transform: scale(1.4); }
.slide-dot.visited { background: var(--gold-dim); border-color: var(--gold-dim); }

/* ── QUIZ SLIDE ── */
.quiz-slide {
  max-width: 700px; width: 100%;
  animation: fadeUp 0.5s ease both;
}

.quiz-tag {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 20px;
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
}

.quiz-question {
  font-family: var(--font-display);
  font-size: clamp(22px, 4vw, 38px);
  font-weight: 600; line-height: 1.2;
  margin-bottom: 36px;
}

/* ── MULTIPLE CHOICE ── */
.mc-options { display: flex; flex-direction: column; gap: 12px; }
.mc-option {
  padding: 16px 20px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  display: flex; align-items: center; gap: 14px;
  transition: all 0.2s;
  font-size: 14px; color: var(--text-dim);
}
.mc-option:hover:not(.disabled) { border-color: var(--border-bright); color: var(--text); background: var(--gold-glow); }
.mc-option.selected { border-color: var(--gold); color: var(--text); background: var(--gold-glow); }
.mc-option.correct { border-color: var(--correct); color: var(--correct); background: rgba(76,175,125,0.08); }
.mc-option.wrong { border-color: var(--wrong); color: var(--wrong); background: rgba(224,92,92,0.08); }
.mc-option.disabled { cursor: default; }
.mc-key {
  width: 26px; height: 26px; border-radius: 50%;
  border: 1px solid currentColor;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; flex-shrink: 0;
  font-family: var(--font-body);
}

/* ── DRAG & DROP ── */
.dnd-instructions {
  font-size: 12px; letter-spacing: 1px; color: var(--text-dim);
  margin-bottom: 20px; text-transform: uppercase;
}
.dnd-container { display: flex; gap: 24px; flex-wrap: wrap; }
.dnd-pool, .dnd-targets { flex: 1; min-width: 220px; }
.dnd-pool-title, .dnd-target-title {
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold-dim); margin-bottom: 12px;
}
.dnd-items { display: flex; flex-direction: column; gap: 8px; min-height: 60px; }
.dnd-item {
  padding: 12px 16px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: grab; font-size: 13px; color: var(--text);
  transition: all 0.2s; user-select: none;
}
.dnd-item:hover { border-color: var(--gold); background: var(--gold-glow); }
.dnd-item.dragging { opacity: 0.4; cursor: grabbing; }
.dnd-item.correct-pos { border-color: var(--correct); color: var(--correct); cursor: default; }
.dnd-item.wrong-pos { border-color: var(--wrong); color: var(--wrong); }
.dnd-drop-zone {
  min-height: 50px; padding: 8px;
  background: var(--bg3);
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
  transition: border-color 0.2s;
}
.dnd-drop-zone.dragover { border-color: var(--gold); background: var(--gold-glow); }
.dnd-drop-label {
  font-size: 11px; color: var(--gold-dim); margin-bottom: 4px;
  letter-spacing: 1px;
}

/* ── FEEDBACK BOX ── */
.feedback-box {
  margin-top: 24px; padding: 16px 20px;
  border-radius: var(--radius);
  font-size: 13px; line-height: 1.6;
  display: none;
}
.feedback-box.show { display: block; animation: fadeUp 0.3s ease; }
.feedback-box.correct-fb { border: 1px solid var(--correct); color: var(--correct); background: rgba(76,175,125,0.06); }
.feedback-box.wrong-fb { border: 1px solid var(--wrong); color: var(--wrong); background: rgba(224,92,92,0.06); }
.feedback-box strong { display: block; font-size: 15px; margin-bottom: 4px; }

/* ── BUTTONS ── */
.btn-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 48px; gap: 12px;
}
.btn {
  font-family: var(--font-body);
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  padding: 14px 28px; border-radius: var(--radius);
  cursor: pointer; transition: all 0.25s;
  border: none; font-weight: 500;
}
.btn-prev {
  background: transparent; color: var(--text-dim);
  border: 1px solid var(--border);
}
.btn-prev:hover { border-color: var(--border-bright); color: var(--text); }
.btn-next {
  background: var(--gold); color: #0a0a0a;
  border: 1px solid var(--gold);
}
.btn-next:hover { background: var(--gold-light); }
.btn-next:disabled { opacity: 0.3; cursor: default; }
.btn-check {
  background: transparent; color: var(--gold);
  border: 1px solid var(--gold);
}
.btn-check:hover { background: var(--gold-glow); }

/* ── FINAL RESULTS ── */
.results-screen {
  max-width: 700px; width: 100%; text-align: center;
  animation: fadeUp 0.6s ease both;
}
.results-crown {
  font-size: 64px; margin-bottom: 24px;
  animation: floatGold 3s ease-in-out infinite;
}
@keyframes floatGold {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
.results-headline {
  font-family: var(--font-display);
  font-size: clamp(36px, 6vw, 64px);
  font-weight: 600; margin-bottom: 12px;
}
.results-sub {
  font-size: 13px; letter-spacing: 2px; color: var(--text-dim);
  text-transform: uppercase; margin-bottom: 40px;
}
.results-score-ring {
  width: 160px; height: 160px;
  border-radius: 50%;
  border: 3px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 40px;
  position: relative;
  background: var(--bg2);
}
.results-score-ring::before {
  content: '';
  position: absolute; inset: -3px;
  border-radius: 50%;
  background: conic-gradient(var(--gold) var(--pct, 0%), transparent var(--pct, 0%));
  z-index: -1;
}
.results-score-number {
  font-family: var(--font-display);
  font-size: 52px; font-weight: 600; color: var(--gold-light);
  line-height: 1;
}
.results-score-label {
  font-size: 10px; letter-spacing: 3px; color: var(--text-dim);
  text-transform: uppercase; margin-top: 4px;
}
.results-breakdown {
  display: flex; gap: 20px; justify-content: center;
  margin-bottom: 40px; flex-wrap: wrap;
}
.results-stat {
  padding: 16px 24px; background: var(--bg2);
  border: 1px solid var(--border); border-radius: var(--radius);
  min-width: 120px;
}
.results-stat-n {
  font-family: var(--font-display);
  font-size: 32px; font-weight: 600; color: var(--gold-light);
}
.results-stat-l { font-size: 10px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; }

/* ── CERTIFICATE ── */
#certificate-preview {
  width: 100%; max-width: 700px;
  aspect-ratio: 1.41/1;
  background: #0e0c08;
  border: 1px solid var(--gold-dim);
  border-radius: var(--radius);
  position: relative; overflow: hidden;
  margin: 0 auto 32px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 48px;
}
#certificate-preview::before,
#certificate-preview::after {
  content: '';
  position: absolute;
  border: 1px solid rgba(201,168,76,0.15);
  inset: 16px; border-radius: var(--radius);
  pointer-events: none;
}
#certificate-preview::after { inset: 20px; }
.cert-top-label {
  font-size: 10px; letter-spacing: 6px; text-transform: uppercase;
  color: var(--gold-dim); margin-bottom: 20px;
}
.cert-headline {
  font-family: var(--font-display);
  font-size: clamp(28px, 4vw, 44px);
  font-weight: 300; text-align: center;
  line-height: 1.3; margin-bottom: 8px;
}
.cert-name {
  font-family: var(--font-display);
  font-size: clamp(22px, 3.5vw, 38px);
  font-weight: 600; color: var(--gold-light);
  font-style: italic; text-align: center; margin-bottom: 20px;
}
.cert-line {
  width: 120px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 0 auto 20px;
}
.cert-course {
  font-size: 13px; letter-spacing: 2px; color: var(--text-dim);
  text-transform: uppercase; text-align: center; margin-bottom: 8px;
}
.cert-score-badge {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 12px; letter-spacing: 2px; color: var(--gold);
  border: 1px solid var(--border); padding: 6px 16px; border-radius: 20px;
  margin-top: 16px;
}
.cert-corner {
  position: absolute; width: 40px; height: 40px;
  border-color: var(--gold-dim); border-style: solid;
}
.cert-corner-tl { top: 28px; left: 28px; border-width: 1px 0 0 1px; }
.cert-corner-tr { top: 28px; right: 28px; border-width: 1px 1px 0 0; }
.cert-corner-bl { bottom: 28px; left: 28px; border-width: 0 0 1px 1px; }
.cert-corner-br { bottom: 28px; right: 28px; border-width: 0 1px 1px 0; }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  #sidebar { transform: translateX(-100%); }
  #sidebar.open { transform: translateX(0); }
  #main { margin-left: 0; }
  #menu-toggle { display: block; }
  #slide-area { padding: 32px 20px; }
  .btn-row { flex-wrap: wrap; }
  .dnd-container { flex-direction: column; }
}

/* ── OVERLAY for mobile sidebar ── */
#overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 90;
}
#overlay.show { display: block; }
</style>
</head>
<body>

<div id="overlay"></div>
<div id="app">

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div id="sidebar-logo">
      <div class="course-tag">Curso Interactivo</div>
      <div class="course-title" id="sidebar-course-title">—</div>
    </div>
    <div id="sidebar-progress-bar"><div id="sidebar-progress-fill"></div></div>
    <div id="sidebar-progress-text" id="sidebar-progress-text">0% completado</div>
    <nav id="sidebar-nav"></nav>
  </aside>

  <!-- MAIN -->
  <main id="main">
    <div id="topbar">
      <button id="menu-toggle">☰</button>
      <div id="breadcrumb">Módulo <span id="bc-module">—</span> · <span id="bc-lesson">—</span></div>
      <div id="score-badge">✦ <span id="score-display">0</span> pts</div>
    </div>
    <div id="slide-area"></div>
  </main>

</div>

<script>
/* ================================================================
   ███████╗  COURSE DATA — EDITA AQUÍ PARA PERSONALIZAR EL CURSO
   ================================================================
   Estructura:
   COURSE_CONFIG  → título, autor, nombre del alumno (placeholder)
   COURSE_DATA    → array de módulos, cada uno con:
                    - lessons: array de lecciones (cada lección = slides)
                    - midQuiz (opcional): pregunta tras la lección
                    - finalQuiz: array de preguntas al cerrar módulo
   
   Tipos de pregunta soportados:
   - type: "mc"   → opción múltiple  (options[], correct: índice)
   - type: "dnd"  → drag & drop ordenar (items[], correctOrder[])
   ================================================================ */

const COURSE_CONFIG = {
  title: "Nombre del Curso",           // ← CAMBIA ESTO
  subtitle: "Tu subtítulo aquí",       // ← CAMBIA ESTO
  author: "Nombre del Autor",          // ← CAMBIA ESTO
  accentEmoji: "✦",
  studentNamePlaceholder: "Estudiante"
};

const COURSE_DATA = [
  {
    moduleTitle: "Módulo 1: Introducción",   // ← CAMBIA NOMBRE MÓDULO
    lessons: [
      {
        lessonTitle: "¿Qué es esto?",        // ← CAMBIA TÍTULO LECCIÓN
        slides: [
          {
            type: "title",   // slide de portada/intro
            eyebrow: "Lección 1",
            headline: "Bienvenido al <em>Módulo 1</em>",
            body: "Aquí va una introducción breve y atractiva sobre lo que el alumno va a aprender en esta lección. Sé directo, motivador y claro.",
          },
          {
            type: "keypoints",   // slide con lista de puntos clave
            eyebrow: "Lección 1 · Puntos Clave",
            headline: "Lo que aprenderás",
            points: [
              "Punto clave número uno de esta lección",
              "Punto clave número dos con más detalle",
              "Punto clave número tres que cierra la idea",
            ]
          },
          {
            type: "content",   // slide de contenido libre
            eyebrow: "Lección 1 · Profundidad",
            headline: "El concepto central",
            body: "Desarrolla aquí el concepto principal con más detalle. Puedes usar 2-4 párrafos. Mantén el tono activo y habla directamente al alumno como si fuera una conversación.",
            showImagePlaceholder: true   // pon false si no quieres el bloque imagen
          }
        ],
        // Pregunta a mitad de módulo (opcional, pon null para quitarla)
        midQuiz: {
          type: "mc",
          question: "¿Cuál de estas opciones describe mejor el concepto que acabas de ver?",
          options: [
            "Opción incorrecta A",
            "Opción correcta ✓",
            "Opción incorrecta B",
            "Opción incorrecta C"
          ],
          correct: 1,
          feedback: {
            correct: "¡Exacto! Eso es exactamente lo que acabas de aprender.",
            wrong: "No del todo. Recuerda que el concepto se refiere a [explicación breve]."

/* ================================================================
   ENGINE — no necesitas editar nada de aquí abajo
   ================================================================ */

let state = {
  moduleIdx: 0,
  stepIdx: 0,       // índice dentro del módulo (lección / quiz)
  slideIdx: 0,      // índice dentro de la lección actual
  score: 0,
  totalQuestions: 0,
  correctAnswers: 0,
  answered: false,
  studentName: COURSE_CONFIG.studentNamePlaceholder,
  steps: []         // secuencia plana del módulo actual
};

// Build flat step sequence for a module
function buildSteps(moduleIdx) {
  const mod = COURSE_DATA[moduleIdx];
  const steps = [];
  mod.lessons.forEach((lesson, li) => {
    steps.push({ kind: 'lesson', lessonIdx: li });
    if (lesson.midQuiz) {
      steps.push({ kind: 'midQuiz', lessonIdx: li });
    }
  });
  if (mod.finalQuiz && mod.finalQuiz.length) {
    mod.finalQuiz.forEach((q, qi) => {
      steps.push({ kind: 'finalQuiz', qIdx: qi });
    });
  }
  return steps;
}

function init() {
  document.getElementById('sidebar-course-title').textContent = COURSE_CONFIG.title;
  buildSidebar();
  loadModule(0);
}

function buildSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';
  COURSE_DATA.forEach((mod, mi) => {
    const modEl = document.createElement('div');
    modEl.className = 'nav-module';
    modEl.innerHTML = `<div class="nav-module-title">${mod.moduleTitle}</div>`;
    mod.lessons.forEach((lesson, li) => {
      const lessonEl = document.createElement('div');
      lessonEl.className = 'nav-lesson';
      lessonEl.id = `nav-${mi}-${li}`;
      lessonEl.innerHTML = `<span class="nav-dot"></span>${lesson.lessonTitle}`;
      lessonEl.onclick = () => goTo(mi, li);
      modEl.appendChild(lessonEl);
    });
    const quizEl = document.createElement('div');
    quizEl.className = 'nav-quiz-item';
    quizEl.id = `nav-quiz-${mi}`;
    quizEl.innerHTML = `<span class="nav-dot" style="background:var(--gold-dim)"></span>Quiz Final`;
    modEl.appendChild(quizEl);
    nav.appendChild(modEl);
  });
}

function goTo(moduleIdx, lessonIdx) {
  state.moduleIdx = moduleIdx;
  state.slideIdx = 0;
  state.answered = false;
  state.steps = buildSteps(moduleIdx);
  // find step index for this lesson
  state.stepIdx = state.steps.findIndex(s => s.kind === 'lesson' && s.lessonIdx === lessonIdx) || 0;
  render();
  closeSidebar();
}

function loadModule(moduleIdx) {
  state.moduleIdx = moduleIdx;
  state.stepIdx = 0;
  state.slideIdx = 0;
  state.answered = false;
  state.steps = buildSteps(moduleIdx);
  render();
}

function render() {
  const mod = COURSE_DATA[state.moduleIdx];
  const step = state.steps[state.stepIdx];
  updateProgress();
  updateBreadcrumb(mod, step);
  updateSidebarActive(step);

  const area = document.getElementById('slide-area');
  if (!step) { renderResults(); return; }

  if (step.kind === 'lesson') {
    renderLesson(mod.lessons[step.lessonIdx]);
  } else if (step.kind === 'midQuiz') {
    renderQuiz(mod.lessons[step.lessonIdx].midQuiz);
  } else if (step.kind === 'finalQuiz') {
    renderQuiz(mod.finalQuiz[step.qIdx]);
  }
}

function renderLesson(lesson) {
  const area = document.getElementById('slide-area');
  const slide = lesson.slides[state.slideIdx];
  const total = lesson.slides.length;

  let html = `<div class="lesson-slide">`;
  html += `<div class="slide-eyebrow">${slide.eyebrow || ''}</div>`;
  html += `<h1 class="slide-headline">${slide.headline || ''}</h1>`;

  if (slide.type === 'title' || slide.type === 'content') {
    if (slide.body) html += `<p class="slide-body">${slide.body}</p>`;
    if (slide.showImagePlaceholder) html += `<div class="slide-image-placeholder">[ imagen / ilustración ]</div>`;
  }
  if (slide.type === 'keypoints' && slide.points) {
    html += `<ul class="slide-keypoints">${slide.points.map(p => `<li>${p}</li>`).join('')}</ul>`;
  }

  // Slide dots
  if (total > 1) {
    html += `<div class="slide-dots">`;
    for (let i = 0; i < total; i++) {
      const cls = i === state.slideIdx ? 'active' : (i < state.slideIdx ? 'visited' : '');
      html += `<div class="slide-dot ${cls}" onclick="goToSlide(${i})"></div>`;
    }
    html += `</div>`;
  }

  html += `<div class="btn-row">`;
  html += `<button class="btn btn-prev" onclick="prevStep()">← Anterior</button>`;
  if (state.slideIdx < total - 1) {
    html += `<button class="btn btn-next" onclick="nextSlide()">Siguiente →</button>`;
  } else {
    html += `<button class="btn btn-next" onclick="nextStep()">Continuar →</button>`;
  }
  html += `</div></div>`;

  area.innerHTML = html;
}

function renderQuiz(q) {
  const area = document.getElementById('slide-area');
  state.answered = false;
  let html = `<div class="quiz-slide">`;
  html += `<div class="quiz-tag">✦ Quiz</div>`;
  html += `<h2 class="quiz-question">${q.question}</h2>`;

  if (q.type === 'mc') {
    html += `<div class="mc-options">`;
    const keys = ['A','B','C','D'];
    q.options.forEach((opt, i) => {
      html += `<div class="mc-option" id="opt-${i}" onclick="selectMC(${i})">
        <span class="mc-key">${keys[i]}</span>${opt}
      </div>`;
    });
    html += `</div>`;
    html += `<div class="feedback-box" id="feedback"></div>`;
    html += `<div class="btn-row">
      <button class="btn btn-prev" onclick="prevStep()">← Anterior</button>
      <button class="btn btn-check" id="btn-check" onclick="checkMC(${q.correct}, \`${escapeJs(q.feedback.correct)}\`, \`${escapeJs(q.feedback.wrong)}\`)">Verificar</button>
      <button class="btn btn-next" id="btn-next-quiz" style="display:none" onclick="nextStep()">Continuar →</button>
    </div>`;
  } else if (q.type === 'dnd') {
    html += renderDnD(q);
    html += `<div class="feedback-box" id="feedback"></div>`;
    html += `<div class="btn-row">
      <button class="btn btn-prev" onclick="prevStep()">← Anterior</button>
      <button class="btn btn-check" id="btn-check" onclick="checkDnD(${JSON.stringify(q.correctOrder)}, \`${escapeJs(q.feedback.correct)}\`, \`${escapeJs(q.feedback.wrong)}\`)">Verificar</button>
      <button class="btn btn-next" id="btn-next-quiz" style="display:none" onclick="nextStep()">Continuar →</button>
    </div>`;
  }

  html += `</div>`;
  area.innerHTML = html;
  if (q.type === 'dnd') initDnD();
}

function renderDnD(q) {
  let html = `<p class="dnd-instructions">Arrastra los elementos al orden correcto</p>`;
  html += `<div class="dnd-container">`;
  html += `<div class="dnd-pool"><div class="dnd-pool-title">Elementos</div><div class="dnd-items" id="dnd-pool">`;
  q.items.forEach((item, i) => {
    html += `<div class="dnd-item" draggable="true" data-idx="${i}">${item}</div>`;
  });
  html += `</div></div>`;
  html += `<div class="dnd-targets"><div class="dnd-target-title">Orden correcto</div>`;
  q.items.forEach((_, i) => {
    html += `<div class="dnd-drop-label">${i+1}.</div>
      <div class="dnd-drop-zone" data-slot="${i}" id="slot-${i}"></div>`;
  });
  html += `</div></div>`;
  return html;
}

let dragSrc = null;
function initDnD() {
  document.querySelectorAll('.dnd-item').forEach(el => {
    el.addEventListener('dragstart', e => { dragSrc = el; el.classList.add('dragging'); });
    el.addEventListener('dragend', e => { el.classList.remove('dragging'); });
  });
  document.querySelectorAll('.dnd-drop-zone').forEach(zone => {
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', e => {
      e.preventDefault(); zone.classList.remove('dragover');
      if (dragSrc) {
        // if slot occupied, return old item to pool
        if (zone.children.length > 0) {
          const old = zone.children[0];
          document.getElementById('dnd-pool').appendChild(old);
        }
        zone.appendChild(dragSrc);
        dragSrc = null;
      }
    });
  });
  // also allow dropping back to pool
  const pool = document.getElementById('dnd-pool');
  if (pool) {
    pool.addEventListener('dragover', e => e.preventDefault());
    pool.addEventListener('drop', e => {
      e.preventDefault();
      if (dragSrc) { pool.appendChild(dragSrc); dragSrc = null; }
    });
  }
}

function checkDnD(correctOrder, msgOk, msgFail) {
  const slots = document.querySelectorAll('.dnd-drop-zone');
  let allFilled = true;
  slots.forEach(s => { if (!s.children.length) allFilled = false; });
  if (!allFilled) { showFeedback(null, '⚠ Coloca todos los elementos antes de verificar.'); return; }

  let correct = true;
  slots.forEach((slot, i) => {
    const item = slot.children[0];
    const idx = parseInt(item.dataset.idx);
    if (idx !== correctOrder[i]) { correct = false; item.classList.add('wrong-pos'); }
    else { item.classList.add('correct-pos'); }
    item.setAttribute('draggable', false);
  });
  document.querySelectorAll('#dnd-pool .dnd-item').forEach(el => el.setAttribute('draggable', false));

  state.answered = true;
  state.totalQuestions++;
  if (correct) { state.correctAnswers++; state.score += 100; }
  updateScore();
  showFeedback(correct, correct ? msgOk : msgFail);
  document.getElementById('btn-check').style.display = 'none';
  document.getElementById('btn-next-quiz').style.display = 'inline-block';
}

function selectMC(idx) {
  if (state.answered) return;
  document.querySelectorAll('.mc-option').forEach(el => el.classList.remove('selected'));
  document.getElementById(`opt-${idx}`).classList.add('selected');
  window._selectedMC = idx;
}

function checkMC(correct, msgOk, msgFail) {
  if (window._selectedMC === undefined) { showFeedback(null, '⚠ Selecciona una opción primero.'); return; }
  const isCorrect = window._selectedMC === correct;
  state.answered = true;
  state.totalQuestions++;
  if (isCorrect) { state.correctAnswers++; state.score += 100; }
  updateScore();
  document.querySelectorAll('.mc-option').forEach((el, i) => {
    el.classList.add('disabled');
    if (i === correct) el.classList.add('correct');
    else if (i === window._selectedMC && !isCorrect) el.classList.add('wrong');
  });
  showFeedback(isCorrect, isCorrect ? msgOk : msgFail);
  document.getElementById('btn-check').style.display = 'none';
  document.getElementById('btn-next-quiz').style.display = 'inline-block';
  window._selectedMC = undefined;
}

function showFeedback(ok, msg) {
  const fb = document.getElementById('feedback');
  if (!fb) return;
  if (ok === null) { fb.className = 'feedback-box wrong-fb show'; fb.innerHTML = msg; return; }
  fb.className = `feedback-box ${ok ? 'correct-fb' : 'wrong-fb'} show`;
  fb.innerHTML = `<strong>${ok ? '✓ Correcto' : '✗ Incorrecto'}</strong>${msg}`;
}

function nextSlide() {
  const step = state.steps[state.stepIdx];
  if (step.kind === 'lesson') {
    const lesson = COURSE_DATA[state.moduleIdx].lessons[step.lessonIdx];
    if (state.slideIdx < lesson.slides.length - 1) { state.slideIdx++; render(); }
  }
}

function goToSlide(i) {
  state.slideIdx = i; render();
}

function nextStep() {
  if (state.stepIdx < state.steps.length - 1) {
    state.stepIdx++;
    state.slideIdx = 0;
    state.answered = false;
    render();
  } else {
    // last step of module
    if (state.moduleIdx < COURSE_DATA.length - 1) {
      loadModule(state.moduleIdx + 1);
    } else {
      renderResults();
    }
  }
}

function prevStep() {
  const step = state.steps[state.stepIdx];
  if (step && step.kind === 'lesson' && state.slideIdx > 0) {
    state.slideIdx--;
    render();
    return;
  }
  if (state.stepIdx > 0) {
    state.stepIdx--;
    state.answered = false;
    const prev = state.steps[state.stepIdx];
    if (prev.kind === 'lesson') {
      const lesson = COURSE_DATA[state.moduleIdx].lessons[prev.lessonIdx];
      state.slideIdx = lesson.slides.length - 1;
    } else { state.slideIdx = 0; }
    render();
  } else if (state.moduleIdx > 0) {
    loadModule(state.moduleIdx - 1);
    // jump to last step
    const lastMod = COURSE_DATA[state.moduleIdx];
    state.stepIdx = state.steps.length - 1;
    render();
  }
}

function renderResults() {
  const pct = state.totalQuestions > 0 ? Math.round((state.correctAnswers / state.totalQuestions) * 100) : 100;
  const area = document.getElementById('slide-area');
  const passed = pct >= 60;
  area.innerHTML = `
    <div class="results-screen">
      <div class="results-crown">${passed ? '👑' : '📚'}</div>
      <h1 class="results-headline" style="color:var(--gold-light)">${passed ? 'Curso Completado' : 'Sigue Practicando'}</h1>
      <p class="results-sub">${COURSE_CONFIG.title}</p>
      <div class="results-score-ring" style="--pct:${pct}%">
        <div>
          <div class="results-score-number">${pct}%</div>
          <div class="results-score-label">puntuación</div>
        </div>
      </div>
      <div class="results-breakdown">
        <div class="results-stat"><div class="results-stat-n" style="color:var(--correct)">${state.correctAnswers}</div><div class="results-stat-l">Correctas</div></div>
        <div class="results-stat"><div class="results-stat-n" style="color:var(--wrong)">${state.totalQuestions - state.correctAnswers}</div><div class="results-stat-l">Errores</div></div>
        <div class="results-stat"><div class="results-stat-n">${state.score}</div><div class="results-stat-l">Puntos</div></div>
      </div>
      ${passed ? `
      <div style="margin-bottom:24px">
        <label style="font-size:11px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;display:block;margin-bottom:8px">
          Tu nombre para el certificado
        </label>
        <input id="cert-name-input" type="text" value="${COURSE_CONFIG.studentNamePlaceholder}"
          style="background:var(--bg2);border:1px solid var(--border);color:var(--text);
          font-family:var(--font-display);font-size:18px;padding:10px 16px;border-radius:var(--radius);
          width:100%;max-width:400px;outline:none;text-align:center;"
          oninput="updateCertName(this.value)"
        />
      </div>
      <div id="certificate-preview">
        <div class="cert-corner cert-corner-tl"></div>
        <div class="cert-corner cert-corner-tr"></div>
        <div class="cert-corner cert-corner-bl"></div>
        <div class="cert-corner cert-corner-br"></div>
        <div class="cert-top-label">Certificado de Finalización</div>
        <div class="cert-headline">Se certifica que</div>
        <div class="cert-name" id="cert-name-display">${COURSE_CONFIG.studentNamePlaceholder}</div>
        <div class="cert-line"></div>
        <div class="cert-course">ha completado con éxito</div>
        <div style="font-family:var(--font-display);font-size:clamp(18px,3vw,28px);font-weight:600;color:var(--text);text-align:center;margin-top:8px">${COURSE_CONFIG.title}</div>
        <div class="cert-score-badge">✦ Puntuación: ${pct}% · ${state.score} pts</div>
      </div>
      <button class="btn btn-next" onclick="downloadCertificate()" style="margin:0 auto;display:block">
        ↓ Descargar Certificado
      </button>` : `
      <button class="btn btn-prev" onclick="loadModule(0)" style="margin:0 auto;display:block">
        ↩ Reintentar el curso
      </button>`}
    </div>`;
  updateBreadcrumbText('Resultados', '');
}

function updateCertName(val) {
  const el = document.getElementById('cert-name-display');
  if (el) el.textContent = val || COURSE_CONFIG.studentNamePlaceholder;
}

function downloadCertificate() {
  const cert = document.getElementById('certificate-preview');
  if (!cert) return;
  const name = document.getElementById('cert-name-input')?.value || 'certificado';
  // Simple print-based download
  const w = window.open('', '_blank');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
      body{margin:0;background:#0e0c08;display:flex;align-items:center;justify-content:center;min-height:100vh;}
      ${document.querySelector('style').textContent}
    </style></head><body>
    ${cert.outerHTML}
    <script>window.onload=()=>{window.print();}<\/script>
    </body></html>`);
  w.document.close();
}

function updateProgress() {
  const total = COURSE_DATA.reduce((acc, m) => acc + buildSteps(COURSE_DATA.indexOf(m)).length, 0);
  let done = 0;
  for (let mi = 0; mi < state.moduleIdx; mi++) done += buildSteps(mi).length;
  done += state.stepIdx;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('sidebar-progress-fill').style.width = pct + '%';
  document.getElementById('sidebar-progress-text').textContent = pct + '% completado';
}

function updateScore() {
  document.getElementById('score-display').textContent = state.score;
}

function updateBreadcrumb(mod, step) {
  const modTitle = mod?.moduleTitle || '';
  let lessonTitle = '';
  if (step) {
    if (step.kind === 'lesson') lessonTitle = COURSE_DATA[state.moduleIdx].lessons[step.lessonIdx].lessonTitle;
    else if (step.kind === 'midQuiz') lessonTitle = 'Quiz · ' + COURSE_DATA[state.moduleIdx].lessons[step.lessonIdx].lessonTitle;
    else if (step.kind === 'finalQuiz') lessonTitle = 'Quiz Final';
  }
  document.getElementById('bc-module').textContent = modTitle;
  document.getElementById('bc-lesson').textContent = lessonTitle;
}

function updateBreadcrumbText(a, b) {
  document.getElementById('bc-module').textContent = a;
  document.getElementById('bc-lesson').textContent = b;
}

function updateSidebarActive(step) {
  document.querySelectorAll('.nav-lesson, .nav-quiz-item').forEach(el => el.classList.remove('active'));
  if (!step) return;
  if (step.kind === 'lesson' || step.kind === 'midQuiz') {
    const li = step.lessonIdx;
    const el = document.getElementById(`nav-${state.moduleIdx}-${li}`);
    if (el) { el.classList.add('active'); if (step.kind !== 'midQuiz') el.querySelector('.nav-dot')?.classList.add('visited'); }
  } else if (step.kind === 'finalQuiz') {
    const el = document.getElementById(`nav-quiz-${state.moduleIdx}`);
    if (el) el.classList.add('active');
  }
}

function escapeJs(str) { return str.replace(/`/g, '\\`').replace(/\$/g, '\\$'); }

// Mobile sidebar
document.getElementById('menu-toggle').onclick = () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
};
document.getElementById('overlay').onclick = closeSidebar;
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// Start
init();
</script>
